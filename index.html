<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KELVIN LOVING - Site de Rencontre</title>
    
    <!-- Police Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="header-title">KELVIN LOVING ❤️</div>
            <div class="header-actions">
                <button id="btnLogout" class="btn-logout" style="display: none;">Déconnexion</button>
            </div>
        </div>

        <!-- AUTH - SIGNUP PAGE -->
        <div id="pageSignup" class="page">
            <div class="auth-container">
                <h1 class="auth-title">Bienvenue</h1>
                <div id="errorSignup" class="error-message"></div>
                
                <div class="file-input-wrapper">
                    <label for="photoInput" class="file-input-label" id="photoLabel">
                        📸 Ajouter une photo
                    </label>
                    <input type="file" id="photoInput" accept="image/*">
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="signupEmail" class="form-input" placeholder="votre@email.com">
                </div>

                <div class="form-group">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" id="signupPassword" class="form-input" placeholder="Min. 6 caractères">
                </div>

                <div class="form-group">
                    <label class="form-label">Prénom</label>
                    <input type="text" id="signupName" class="form-input" placeholder="Votre prénom">
                </div>

                <div class="form-group">
                    <label class="form-label">Âge</label>
                    <input type="number" id="signupAge" class="form-input" placeholder="18" min="18">
                </div>

                <!-- TOUS LES PAYS AFRICAINS -->
                <div class="form-group">
                    <label class="form-label">Pays</label>
                    <select id="signupCountry" class="form-input" required>
                        <option value="">-- Choisis ton pays --</option>
                        <option value="ZA">🇿🇦 Afrique du Sud</option>
                        <option value="DZ">🇩🇿 Algérie</option>
                        <option value="AO">🇦🇴 Angola</option>
                        <option value="BJ">🇧🇯 Bénin</option>
                        <option value="BW">🇧🇼 Botswana</option>
                        <option value="BF">🇧🇫 Burkina Faso</option>
                        <option value="BI">🇧🇮 Burundi</option>
                        <option value="CM">🇨🇲 Cameroun</option>
                        <option value="CV">🇨🇻 Cap-Vert</option>
                        <option value="CF">🇨🇫 République Centrafricaine</option>
                        <option value="KM">🇰🇲 Comores</option>
                        <option value="CG">🇨🇬 Congo-Brazzaville</option>
                        <option value="CD">🇨🇩 République Démocratique du Congo</option>
                        <option value="CI">🇨🇮 Côte d'Ivoire</option>
                        <option value="DJ">🇩🇯 Djibouti</option>
                        <option value="EG">🇪🇬 Égypte</option>
                        <option value="ER">🇪🇷 Érythrée</option>
                        <option value="SZ">🇸🇿 Eswatini</option>
                        <option value="ET">🇪🇹 Éthiopie</option>
                        <option value="GA">🇬🇦 Gabon</option>
                        <option value="GM">🇬🇲 Gambie</option>
                        <option value="GH">🇬🇭 Ghana</option>
                        <option value="GN">🇬🇳 Guinée</option>
                        <option value="GW">🇬🇼 Guinée-Bissau</option>
                        <option value="GQ">🇬🇶 Guinée Équatoriale</option>
                        <option value="KE">🇰🇪 Kenya</option>
                        <option value="LS">🇱🇸 Lesotho</option>
                        <option value="LR">🇱🇷 Liberia</option>
                        <option value="LY">🇱🇾 Libye</option>
                        <option value="MG">🇲🇬 Madagascar</option>
                        <option value="MW">🇲🇼 Malawi</option>
                        <option value="ML">🇲🇱 Mali</option>
                        <option value="MA">🇲🇦 Maroc</option>
                        <option value="MU">🇲🇺 Maurice</option>
                        <option value="MR">🇲🇷 Mauritanie</option>
                        <option value="MZ">🇲🇿 Mozambique</option>
                        <option value="NA">🇳🇦 Namibie</option>
                        <option value="NE">🇳🇪 Niger</option>
                        <option value="NG">🇳🇬 Nigeria</option>
                        <option value="UG">🇺🇬 Ouganda</option>
                        <option value="RW">🇷🇼 Rwanda</option>
                        <option value="ST">🇸🇹 Sao Tomé-et-Principe</option>
                        <option value="SN">🇸🇳 Sénégal</option>
                        <option value="SC">🇸🇨 Seychelles</option>
                        <option value="SL">🇸🇱 Sierra Leone</option>
                        <option value="SO">🇸🇴 Somalie</option>
                        <option value="SD">🇸🇩 Soudan</option>
                        <option value="SS">🇸 Soudan du Sud</option>
                        <option value="TZ">🇹🇿 Tanzanie</option>
                        <option value="TD">🇹🇩 Tchad</option>
                        <option value="TG">🇹🇬 Togo</option>
                        <option value="TN">🇹🇳 Tunisie</option>
                        <option value="ZM">🇿🇲 Zambie</option>
                        <option value="ZW">🇿🇼 Zimbabwe</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Bio</label>
                    <textarea id="signupBio" class="form-textarea" placeholder="Parlez de vous..."></textarea>
                </div>

                <button id="btnSignup" class="btn-primary" disabled>S'inscrire</button>
                
                <div class="auth-toggle">
                    Déjà inscrit ? <a href="#" id="linkToLogin">Se connecter</a>
                </div>
            </div>
        </div>

        <!-- AUTH - LOGIN PAGE -->
        <div id="pageLogin" class="page active">
            <div class="auth-container">
                <h1 class="auth-title">Connexion</h1>
                <div id="errorLogin" class="error-message"></div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="loginEmail" class="form-input" placeholder="votre@email.com">
                </div>

                <div class="form-group">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="Votre mot de passe">
                </div>

                <button id="btnLogin" class="btn-primary" disabled>Se connecter</button>
                
                <div class="auth-toggle">
                    Pas encore inscrit ? <a href="#" id="linkToSignup">S'inscrire</a>
                </div>
            </div>
        </div>

        <!-- SWIPE PAGE -->
        <div id="pageSwipe" class="page">
            <div class="swipe-container">
                <div id="cardsContainer"></div>
                <div class="swipe-buttons">
                    <button id="btnPass" class="btn-action btn-pass">✖️</button>
                    <button id="btnLike" class="btn-action btn-like">❤️</button>
                </div>
            </div>
        </div>

        <!-- CHAT PAGE -->
        <div id="pageChat" class="page">
            <div class="chat-container">
                <div class="chat-header">
                    <button id="btnBackToSwipe" class="btn-back">←</button>
                    <img id="matchAvatar" class="chat-avatar" src="" alt="Avatar">
                    <div class="chat-header-info">
                        <div id="matchName" class="chat-name">
                            <span id="matchFlag"></span> <span id="matchNameText"></span>
                        </div>
                    </div>
                </div>
                <div id="messagesContainer" class="messages-container"></div>
                <div class="chat-input-container">
                    <textarea id="chatInput" class="chat-input" placeholder="Votre message..." rows="1"></textarea>
                    <button id="btnSendMessage" class="btn-send">📤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPT MODULE -->
    <script type="module" src="app-v3.js"></script>
</body>
</html>
