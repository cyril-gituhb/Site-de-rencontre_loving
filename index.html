<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KELVIN LOVING 🏖️</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #128C7E; --secondary: #25D366; --whatsapp-bg: #e5ddd5; --red-chat: #ff4b2b; --blue-chat: #0077b6; --purple: #6a1b9a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        /* FIX STRUCTURE PLEIN ÉCRAN */
        html, body { height: 100%; width: 100%; overflow: hidden; background: #90e0ef; }
        body { display: flex; justify-content: center; align-items: center; }

        #app { 
            width: 100vw; height: 100%; display: flex; flex-direction: column; 
            background: white; position: relative; overflow: hidden;
        }
        @media (min-width: 600px) { #app { width: 400px; height: 92vh; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); } }
        
        nav { background: var(--primary); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .nav-links { display: flex; gap: 4px; position: relative; }
        .nav-links button { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 6px; border-radius: 12px; font-size: 10px; cursor: pointer; }
        
        /* NOTIFICATION BADGE */
        .badge-notif { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; display: none; }

        .view { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f0f2f5; }
        .hidden { display: none !important; }

        /* LOBBY & SCROLL */
        #groupes-list, #confessions-list { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .groupe-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* CHAT STYLE WHATSAPP */
        .chat-container { flex: 1; display: flex; flex-direction: column; background: var(--whatsapp-bg) url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); height: 100%; overflow: hidden; }
        #messages-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .bulle { max-width: 75%; padding: 10px; border-radius: 12px; font-size: 14px; color: white; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .bulle.moi { align-self: flex-end; background: var(--red-chat); border-top-right-radius: 0; }
        .bulle.autre { align-self: flex-start; background: var(--blue-chat); border-top-left-radius: 0; }

        /* BARRE DE SAISIE FIXE (FIX MOBILE) */
        .input-area { background: white; padding: 10px; display: flex; gap: 10px; align-items: center; flex-shrink: 0; border-top: 1px solid #ddd; }
        #text-input, #conf-input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #ddd; outline: none; font-size: 16px; background: #f9f9f9; }

        /* MUR DES SECRETS STYLE */
        .confession-card { background: linear-gradient(135deg, #6a1b9a, #8e24aa); color: white; padding: 15px; border-radius: 15px 15px 15px 0; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-style: italic; border: 1px solid rgba(255,255,255,0.2); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* MODALS */
        .modal-full { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index:2000; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; width: 100%; display: flex; flex-direction: column; gap: 12px; max-height: 80%; overflow-y: auto; }
        .btn-name-opt { padding: 12px; background: #f0f0f0; border: none; border-radius: 8px; text-align: center; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-name-opt:hover { background: var(--secondary); color: white; }
    </style>
</head>
<body>

<div id="app">
    <nav id="navbar" class="hidden">
        <div class="logo">KELVIN 🏖️</div>
        <div class="nav-links">
            <button onclick="showGroupNamePicker()">➕ Groupe</button>
            <button onclick="showView('page-lobby')">👥 Listes</button>
            <button onclick="showView('page-confessions')">🤫 Mur</button>
            <button onclick="showView('page-settings')">⚙️ Profil</button>
            <div id="notif-dot" class="badge-notif">1</div>
        </div>
    </nav>

    <!-- SIGNUP -->
    <section id="page-signup" class="view">
        <div class="card" style="margin: auto;">
            <h2 style="text-align:center; color:var(--primary)">KELVIN LOVING ❤️</h2>
            <input id="nom" type="text" placeholder="Ton prénom étudiant">
            <div style="display:flex; gap:10px;">
                <button id="m-btn" class="btn-name-opt" style="flex:1" onclick="setSex('garcon')">👨 Garçon</button>
                <button id="f-btn" class="btn-name-opt" style="flex:1" onclick="setSex('fille')">👩 Fille</button>
            </div>
            <input type="file" onchange="previewPhoto(event, 'preview')">
            <center><img id="preview" style="width:60px; height:60px; border-radius:50%; display:none; object-fit:cover; border:2px solid var(--primary)"></center>
            <button class="btn-name-opt" style="background:var(--secondary); color:white;" onclick="startAdventure()">Commencer 🚀</button>
        </div>
    </section>

    <!-- LOBBY -->
    <section id="page-lobby" class="view hidden">
        <div style="padding:10px; font-size:12px; text-align:center; background:#eee;">Liste des Amphis & Étudiants</div>
        <div id="groupes-list"></div>
    </section>

    <!-- MUR DES CONFESSIONS -->
    <section id="page-confessions" class="view hidden">
        <div style="padding:15px; background:var(--purple); color:white; text-align:center; font-weight:bold;">🤫 Le Mur des Secrets Anonymes</div>
        <div id="confessions-list"></div>
        <div class="input-area" style="background:#f3e5f5; border-top: 2px solid var(--purple);">
            <input id="conf-input" type="text" placeholder="Tape un secret ici...">
            <button onclick="postConfession()" style="background:var(--purple); color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;">🤫</button>
        </div>
    </section>

    <!-- CHAT -->
    <section id="page-chat" class="view hidden">
        <div class="chat-container">
            <div class="chat-header" style="background:var(--primary); color:white; padding:10px; display:flex; align-items:center; gap:10px; flex-shrink: 0;">
                <button onclick="showView('page-lobby')" style="background:none; border:none; color:white; font-size:24px;">←</button>
                <img id="chat-img" style="width:35px; height:35px; border-radius:50%; background:white; object-fit: cover;">
                <div style="flex:1">
                    <b id="chat-name">Nom</b><br>
                    <small id="chat-status" style="font-size:10px;">en ligne</small>
                </div>
                <button onclick="inviterAmis()" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:5px 10px; border-radius:10px; font-size:18px;">➕</button>
            </div>
            <div id="messages-box"></div>
            <div class="input-area">
                <input id="text-input" type="text" placeholder="Écrire un message...">
                <button onclick="sendMsg()" style="background:var(--primary); color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;">➤</button>
            </div>
        </div>
    </section>

    <!-- PROFIL -->
    <section id="page-settings" class="view hidden">
        <div class="card" style="margin: 20px auto;">
            <h2>Mon Profil ⚙️</h2>
            <input id="edit-nom" type="text">
            <center><img id="edit-preview" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid var(--primary)"></center>
            <button class="btn-name-opt" style="background:var(--secondary); color:white;" onclick="saveProfile()">Mettre à jour</button>
            <button onclick="deconnecter()" style="color:red; background:none; border:none;">Se déconnecter</button>
        </div>
    </section>

    <!-- MODALS -->
    <div id="modal-names" class="modal-full hidden">
        <div class="card">
            <h3>Nommez votre groupe 🏖️</h3>
            <div id="names-list" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
            <button onclick="closeModals()" style="padding:10px; margin-top:10px;">Annuler</button>
        </div>
    </div>
</div>

<audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

<script>
    const S_URL = "https://doovevgkmarozjululkr.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvb3ZldmdrbWFyb3pqdWx1bGtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyOTE3MzMsImV4cCI6MjA5Njg2NzczM30.Iao5_dnv4j71IPSpy-rdWGR0NPzDEUBMERPFVE8o1G0";
    const sb = supabase.createClient(S_URL, S_KEY);

    let me = null, target = null, activeGroup = null, mySex = "";
    const groupNames = ["Amphi Love 🏖️", "Study Beach 🌊", "Chill Étudiant 🍹", "Sunset Club 🌅", "Révision 📚", "Caffé Vibes ☕", "Island Dating 🏝️", "Vibe Amphi ✨", "Le Jardin 🌴", "Sable Chaud 🐚"];

    function setSex(s) { mySex = s; document.getElementById('m-btn').style.background = s==='garcon'? '#128C7E':'#f0f0f0'; document.getElementById('m-btn').style.color = s==='garcon'?'white':'black'; document.getElementById('f-btn').style.background = s==='fille'? '#128C7E':'#f0f0f0'; document.getElementById('f-btn').style.color = s==='fille'?'white':'black'; }
    function previewPhoto(e, id) { const reader = new FileReader(); reader.onload = () => { document.getElementById(id).src = reader.result; document.getElementById(id).style.display = 'block'; }; reader.readAsDataURL(e.target.files[0]); }
    function closeModals() { document.querySelectorAll('.modal-full').forEach(m => m.classList.add('hidden')); }

    async function startAdventure() {
        const nom = document.getElementById('nom').value; const photo = document.getElementById('preview').src;
        if(!nom || !mySex || !photo) return alert("Complète ton profil ! ❤️");
        let { data: grp } = await sb.from('groups').select('*').limit(1);
        const { data, error } = await sb.from('profiles').insert([{ nom, sexe: mySex, photo, groupe_id: grp[0].id }]).select();
        if(error) return alert("Erreur d'entrée");
        me = data[0]; localStorage.setItem('kelvin_user_id', me.id);
        showView('page-lobby'); initRealtime();
    }

    // --- GROUPES ---
    function showGroupNamePicker() {
        const list = document.getElementById('names-list'); list.innerHTML = "";
        groupNames.forEach(name => {
            list.innerHTML += `<button class="btn-name-opt" onclick="createGroup('${name}')">${name}</button>`;
        });
        document.getElementById('modal-names').classList.remove('hidden');
    }
    async function createGroup(name) {
        const { data } = await sb.from('groups').insert([{ nom: name }]).select();
        closeModals(); renderLobby();
    }
    function inviterAmis() {
        const text = `Rejoins mon groupe sur KELVIN LOVING ❤️ : ${window.location.href}`;
        navigator.clipboard.writeText(text);
        alert("Lien d'invitation copié ! Envoie-le à tes amis.");
    }

    // --- SECRETS (ORDRE DÉCROISSANT) ---
    async function postConfession() {
        const input = document.getElementById('conf-input');
        if(!input.value.trim()) return;
        await sb.from('confessions').insert([{ texte: input.value }]);
        input.value = "";
    }
    async function loadConfessions() {
        const { data } = await sb.from('confessions').select('*').order('created_at', { ascending: false });
        document.getElementById('confessions-list').innerHTML = data.map(c => `
            <div class="confession-card">🤫 Un étudiant dit : "${c.texte}"</div>
        `).join('');
    }

    // --- CHAT & SCROLL ---
    async function sendMsg() {
        const input = document.getElementById('text-input');
        if (!input.value.trim()) return;
        const msgData = { expediteur_id: me.id, texte: input.value };
        if (activeGroup) msgData.group_id = activeGroup; else msgData.destinataire_id = target.id;
        await sb.from('messages').insert([msgData]);
        input.value = "";
        loadMessages();
    }
    async function loadMessages() {
        let query = sb.from('messages').select('*');
        if (activeGroup) query = query.eq('group_id', activeGroup);
        else query = query.or(`and(expediteur_id.eq.${me.id},destinataire_id.eq.${target.id}),and(expediteur_id.eq.${target.id},destinataire_id.eq.${me.id})`);
        
        const { data } = await query.order('created_at', { ascending: true });
        const box = document.getElementById('messages-box');
        box.innerHTML = data.map(m => `<div class="bulle ${m.expediteur_id === me.id ? 'moi' : 'autre'}">${m.texte}</div>`).join('');
        box.scrollTop = box.scrollHeight; // Scroll vers le bas
    }

    // --- NOTIFICATIONS ---
    function notify(msg) {
        if(msg.expediteur_id !== me.id) {
            document.getElementById('notif-dot').style.display = 'block';
            document.getElementById('notif-sound').play();
        }
    }

    // --- LOBBY ---
    async function renderLobby() {
        const { data: users } = await sb.from('profiles').select('*');
        const { data: grps } = await sb.from('groups').select('*');
        document.getElementById('groupes-list').innerHTML = grps.map(g => {
            const mbs = users.filter(u => u.groupe_id === g.id);
            return `<div class="groupe-item" onclick="activeGroup='${g.id}'; showView('page-chat')">
                <b>🏝️ ${g.nom} (${mbs.length}/10)</b>
                <div class="membres-grid">${mbs.map(m => `<div class="avatar-wrap" onclick='event.stopPropagation(); target=${JSON.stringify(m)}; activeGroup=null; showView("page-chat")'><img class="avatar-img" src="${m.photo}"><small>${m.nom}</small></div>`).join('')}</div>
            </div>`;
        }).join('');
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('navbar').classList.toggle('hidden', id === 'page-signup');
        if (id === 'page-lobby') renderLobby();
        if (id === 'page-confessions') loadConfessions();
        if (id === 'page-chat') { loadMessages(); document.getElementById('notif-dot').style.display = 'none'; }
    }

    function initRealtime() {
        sb.channel('all').on('postgres_changes', { event: '*', schema: 'public' }, (p) => {
            renderLobby();
            loadConfessions();
            if(p.table === 'messages') {
                loadMessages();
                notify(p.new);
            }
        }).subscribe();
    }

    async function deconnecter() { if(me) await sb.from('profiles').delete().eq('id', me.id); localStorage.clear(); location.reload(); }

    window.onload = async () => {
        const id = localStorage.getItem('kelvin_user_id');
        if (id) {
            const { data } = await sb.from('profiles').select('*').eq('id', id).single();
            if (data) { me = data; showView('page-lobby'); initRealtime(); }
        }
    };
</script>
</body>
                </html>
