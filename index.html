<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kELVIN Loving</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SIGNUP -->
<section id="page-signup" class="page active">
  <div class="whatsapp-header">kELVIN Loving</div>
  <div class="card">
    <h2>Bienvenue ❤️</h2>
    <input id="nom" placeholder="Ton prénom">
    
    <div class="sexe-box">
      <button type="button" class="sexe-btn" data-sexe="fille">👩 Fille</button>
      <button type="button" class="sexe-btn" data-sexe="garcon">👨 Garçon</button>
    </div>
    <input type="hidden" id="sexe">

    <label class="upload">📷 Photo de profil
      <input type="file" id="photo" accept="image/*">
    </label>
    <img id="preview">

    <button onclick="sInscrire()">Continuer</button>
    <p class="note">5 filles + 5 garçons par groupe</p>
  </div>
</section>

<!-- LOBBY -->
<section id="page-lobby" class="page">
  <div class="whatsapp-header">
    <span>Groupes kELVIN</span>
    <button onclick="deconnecter()">Déco</button>
  </div>
  <div id="groupes" class="chat-list"></div>
</section>

<!-- CHAT -->
<section id="page-chat" class="page">
  <div class="chat-container">
    <div class="chat-header" id="chat-header">
      <button onclick="retourLobby()">←</button>
      <img id="chat-photo">
      <div>
        <b id="chat-nom"></b>
        <small id="chat-status">en ligne</small>
      </div>
    </div>
    
    <div class="messages" id="messages"></div>
    
    <div class="input-box">
      <input id="msg" placeholder="Tape un message" onkeypress="if(event.key==='Enter') envoyer()">
      <button onclick="envoyer()">➤</button>
    </div>
  </div>
</section>

<script src="app.js"></script>
</body>
</html>
