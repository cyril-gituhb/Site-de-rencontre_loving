<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KELVIN LOVING 🏖️</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #128C7E; --secondary: #25D366; --whatsapp-bg: #e5ddd5; --red-chat: #ff4b2b; --blue-chat: #0077b6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        /* Fix Mobile Height */
        html, body { height: 100%; width: 100%; overflow: hidden; background: #90e0ef; }
        body { display: flex; justify-content: center; align-items: center; }

        #app { 
            width: 100vw; height: 100%; max-height: 100%; 
            background: white; display: flex; flex-direction: column; position: relative; 
        }
        @media (min-width: 600px) { #app { width: 400px; height: 92vh; border-radius: 20px; } }
        
        nav { background: var(--primary); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .nav-links button { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px; border-radius: 10px; font-size: 10px; cursor: pointer; }

        .view { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f0f2f5; position: relative; }
        .hidden { display: none !important; }

        /* Lobby */
        #groupes-list { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .groupe-item { background: white; padding: 12px; border-radius: 10px; margin: 8px; border-left: 5px solid var(--primary); }
        .membres-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
        .avatar-wrap { display: flex; flex-direction: column; align-items: center; width: 50px; cursor: pointer; }
        .avatar-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }

        /* Chat Bulles & Input Fix */
        .chat-container { flex: 1; display: flex; flex-direction: column; background: var(--whatsapp-bg) url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); height: 100%; }
        #messages-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; -webkit-overflow-scrolling: touch; }
        .bulle { max-width: 75%; padding: 10px; border-radius: 10px; font-size: 14px; color: white; word-wrap: break-word; }
        .bulle.moi { align-self: flex-end; background: var(--red-chat); border-top-right-radius: 0; }
        .bulle.autre { align-self: flex-start; background: var(--blue-chat); border-top-left-radius: 0; }

        /* Barre de saisie fixée en bas */
        .input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
        #text-input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; font-size: 16px; }

        /* Modal Overlay */
        .modal-full { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index:1000; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; width: 100%; display: flex; flex-direction: column; gap: 10px; max-height: 80%; overflow-y: auto; }
        .btn-name { padding: 10px; background: #eee; border: none; border-radius: 5px; text-align: left; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <nav id="navbar" class="hidden">
        <div class="logo">KELVIN 🏖️</div>
        <div class="nav-links">
            <button onclick="showView('page-lobby')">Groupes</button>
            <button onclick="showView('page-settings')">⚙️ Profil</button>
            <button onclick="deconnecter()">Quitter</button>
        </div>
    </nav>

    <!-- SIGNUP -->
    <section id="page-signup" class="view">
        <div class="card" style="margin: auto;">
            <h2>Bienvenue ❤️</h2>
            <input id="nom" type="text" placeholder="Ton prénom">
            <div class="sexe-box" style="display:flex; gap:10px;">
                <button class="sexe-btn" id="m-btn" onclick="setSex('garcon')">👨 M</button>
                <button class="sexe-btn" id="f-btn" onclick="setSex('fille')">👩 F</button>
            </div>
            <input type="file" onchange="previewPhoto(event, 'preview')">
            <center><img id="preview" style="width:50px; height:50px; border-radius:50%; display:none; object-fit:cover;"></center>
            <button class="btn-name" style="background:var(--secondary); color:white; text-align:center;" onclick="startAdventure()">Commencer</button>
        </div>
    </section>

    <!-- SETTINGS -->
    <section id="page-settings" class="view hidden">
        <div class="card" style="margin: auto;">
            <h2>Modifier Profil</h2>
            <input id="edit-nom" type="text">
            <input type="file" onchange="previewPhoto(event, 'edit-preview')">
            <center><img id="edit-preview" style="width:50px; height:50px; border-radius:50%; object-fit:cover;"></center>
            <button class="btn-name" style="background:var(--secondary); color:white; text-align:center;" onclick="saveProfile()">Enregistrer</button>
            <button onclick="showView('page-lobby')">Retour</button>
        </div>
    </section>

    <!-- LOBBY -->
    <section id="page-lobby" class="view hidden">
        <div id="groupes-list"></div>
        <button class="btn-name" style="margin: 10px; background: var(--primary); color: white; text-align:center;" onclick="showGroupNamePicker()">➕ Créer un Groupe</button>
    </section>

    <!-- CHAT (Plein écran mobile) -->
    <section id="page-chat" class="view hidden">
        <div class="chat-container">
            <div class="chat-header">
                <button onclick="showView('page-lobby')" style="background:none; border:none; color:white; font-size:24px;">←</button>
                <img id="chat-img" style="width:35px; height:35px; border-radius:50%; background: white;">
                <b id="chat-name">Nom</b>
            </div>
            <div id="messages-box"></div>
            <div class="input-area">
                <input id="text-input" type="text" placeholder="Message...">
                <button onclick="sendMsg()" style="background:var(--primary); color:white; border:none; width:45px; height:45px; border-radius:50%;">➤</button>
            </div>
        </div>
    </section>

    <!-- MODALS -->
    <div id="modal-names" class="modal-full hidden">
        <div class="card">
            <h3>Choisir un nom de groupe</h3>
            <div id="names-list" style="display:flex; flex-direction:column; gap:5px;"></div>
            <button onclick="closeModals()">Fermer</button>
        </div>
    </div>

    <div id="modal-choice" class="modal-full hidden">
        <div class="card">
            <h3 id="choice-name">Option</h3>
            <button class="btn-name" style="background:var(--primary); color:white;" onclick="startPrivate()">💬 Message Privé</button>
            <button class="btn-name" style="background:var(--secondary); color:white;" onclick="joinThisGroup()">👥 Rejoindre son Groupe</button>
            <button onclick="closeModals()">Annuler</button>
        </div>
    </div>
</div>

<script>
    const S_URL = "https://doovevgkmarozjululkr.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvb3ZldmdrbWFyb3pqdWx1bGtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyOTE3MzMsImV4cCI6MjA5Njg2NzczM30.Iao5_dnv4j71IPSpy-rdWGR0NPzDEUBMERPFVE8o1G0";
    const sb = supabase.createClient(S_URL, S_KEY);

    let me = null, target = null, activeGroup = null, mySex = "";
    const groupNames = ["Plage 1 🌊", "L'Amphi 🏛️", "Sunset 🌅", "Révision Chill 📚", "Caffé des Amis ☕", "Beach Party 🏖️", "Study Lab 🧪", "Vibe Étudiante ✨", "Le Jardin 🌴", "Island Love 🏝️"];

    function setSex(s) { mySex = s; document.getElementById('m-btn').style.background = s==='garcon'?'#dcf8c6':'white'; document.getElementById('f-btn').style.background = s==='fille'?'#dcf8c6':'white'; }
    function previewPhoto(e, id) { const reader = new FileReader(); reader.onload = () => { document.getElementById(id).src = reader.result; document.getElementById(id).style.display = 'block'; }; reader.readAsDataURL(e.target.files[0]); }
    function closeModals() { document.querySelectorAll('.modal-full').forEach(m => m.classList.add('hidden')); }

    async function startAdventure() {
        const nom = document.getElementById('nom').value; const photo = document.getElementById('preview').src;
        if(!nom || !mySex || !photo) return alert("Remplis tout !");
        let { data: grp } = await sb.from('groups').select('*').limit(1);
        const { data, error } = await sb.from('profiles').insert([{ nom, sexe: mySex, photo, groupe_id: grp[0].id }]).select();
        if(error) return alert(error.message);
        me = data[0]; localStorage.setItem('kelvin_user_id', me.id);
        showView('page-lobby'); initRealtime();
    }

    // --- LOGIQUE GROUPE ---
    function showGroupNamePicker() {
        const list = document.getElementById('names-list'); list.innerHTML = "";
        groupNames.forEach(name => {
            list.innerHTML += `<button class="btn-name" onclick="createGroup('${name}')">${name}</button>`;
        });
        document.getElementById('modal-names').classList.remove('hidden');
    }

    async function createGroup(name) {
        const { data } = await sb.from('groups').insert([{ nom: name }]).select();
        closeModals(); renderLobby();
    }

    async function tryJoinGroup(gid) {
        const { count } = await sb.from('profiles').select('*', { count: 'exact', head: true }).eq('groupe_id', gid);
        if (count >= 10) return alert("Groupe plein (10/10) !");
        await sb.from('profiles').update({ groupe_id: gid }).eq('id', me.id);
        me.groupe_id = gid; target = null; activeGroup = gid;
        showView('page-chat');
    }

    // --- CHAT GROUPE & PRIVÉ ---
    async function openChoice(e, userObj) {
        e.stopPropagation(); if (userObj.id === me.id) return;
        target = userObj; document.getElementById('choice-name').innerText = userObj.nom;
        document.getElementById('modal-choice').classList.remove('hidden');
    }

    function startPrivate() { 
        if (target.sexe === me.sexe) return alert("Interdit entre même sexe ! 🏖️");
        activeGroup = null; closeModals(); showView('page-chat'); 
    }
    function joinThisGroup() { activeGroup = target.groupe_id; closeModals(); tryJoinGroup(activeGroup); }

    async function sendMsg() {
        const val = document.getElementById('text-input').value; if (!val) return;
        const msgData = { expediteur_id: me.id, texte: val };
        if (activeGroup) msgData.group_id = activeGroup; else msgData.destinataire_id = target.id;
        await sb.from('messages').insert([msgData]);
        document.getElementById('text-input').value = ""; loadMessages();
    }

    async function loadMessages() {
        let query = sb.from('messages').select('*');
        if (activeGroup) {
            query = query.eq('group_id', activeGroup);
            document.getElementById('chat-name').innerText = "Groupe";
            document.getElementById('chat-img').src = "https://cdn-icons-png.flaticon.com/512/32/32441.png";
        } else {
            query = query.or(`and(expediteur_id.eq.${me.id},destinataire_id.eq.${target.id}),and(expediteur_id.eq.${target.id},destinataire_id.eq.${me.id})`);
            document.getElementById('chat-name').innerText = target.nom;
            document.getElementById('chat-img').src = target.photo;
        }
        const { data } = await query.order('created_at', { ascending: true });
        const box = document.getElementById('messages-box');
        box.innerHTML = data.map(m => `<div class="bulle ${m.expediteur_id === me.id ? 'moi' : 'autre'}">${m.texte}</div>`).join('');
        box.scrollTop = box.scrollHeight;
    }

    // --- SYSTEM ---
    async function renderLobby() {
        const { data: users } = await sb.from('profiles').select('*');
        const { data: grps } = await sb.from('groups').select('*');
        document.getElementById('groupes-list').innerHTML = grps.map(g => {
            const mbs = users.filter(u => u.groupe_id === g.id);
            return `<div class="groupe-item" onclick="activeGroup='${g.id}'; tryJoinGroup('${g.id}')">
                <b>${g.nom} (${mbs.length}/10)</b>
                <div class="membres-grid">${mbs.map(m => `<div class="avatar-wrap" onclick='openChoice(event, ${JSON.stringify(m)})'><img class="avatar-img" src="${m.photo}"><small>${m.nom}</small></div>`).join('')}</div>
            </div>`;
        }).join('');
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('navbar').classList.toggle('hidden', id === 'page-signup');
        if (id === 'page-lobby') renderLobby(); else if (id === 'page-chat') loadMessages();
    }

    function initRealtime() { sb.channel('any').on('postgres_changes', { event: '*', schema: 'public' }, () => { renderLobby(); if(me) loadMessages(); }).subscribe(); }

    async function deconnecter() { if(me) await sb.from('profiles').delete().eq('id', me.id); localStorage.clear(); location.reload(); }

    window.onload = async () => {
        const id = localStorage.getItem('kelvin_user_id');
        if (id) { const { data } = await sb.from('profiles').select('*').eq('id', id).single(); if(data) { me = data; showView('page-lobby'); initRealtime(); } }
    };
</script>
</body>
</html>
