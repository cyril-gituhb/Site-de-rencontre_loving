<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KELVIN LOVING 🏖️ | ÉDITION SPÉCIALE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #128C7E; --secondary: #25D366; --whatsapp-bg: #e5ddd5; --red-chat: #ff4b2b; --blue-chat: #0077b6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: #90e0ef; }
        body { display: flex; justify-content: center; align-items: center; }

        #app { width: 100vw; height: 100%; background: white; display: flex; flex-direction: column; position: relative; }
        @media (min-width: 600px) { #app { width: 400px; height: 92vh; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); } }
        
        /* Navigation */
        nav { background: var(--primary); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .nav-links button { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px; border-radius: 10px; font-size: 10px; cursor: pointer; }

        .view { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f0f2f5; }
        .hidden { display: none !important; }

        /* Lobby & Listes */
        #groupes-list, #confessions-list { flex: 1; overflow-y: auto; padding: 15px; }
        .groupe-item, .confession-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 5px solid var(--primary); position: relative; }
        .confession-card { border-left: 5px solid #6a1b9a; background: #f3e5f5; font-style: italic; }
        
        /* Badges & Avatars */
        .avatar-wrap { display: flex; flex-direction: column; align-items: center; width: 60px; cursor: pointer; position: relative; }
        .avatar-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #ccc; }
        .badge { position: absolute; top: -5px; right: 5px; font-size: 14px; background: white; border-radius: 50%; padding: 2px; }
        .mood-tag { font-size: 10px; background: #eee; padding: 2px 5px; border-radius: 10px; margin-top: 2px; }

        /* Chat Bulles */
        .chat-container { flex: 1; display: flex; flex-direction: column; background: var(--whatsapp-bg) url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        #messages-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .bulle { max-width: 75%; padding: 10px; border-radius: 10px; font-size: 14px; color: white; position: relative; }
        .bulle.moi { align-self: flex-end; background: var(--red-chat); border-top-right-radius: 0; }
        .bulle.autre { align-self: flex-start; background: var(--blue-chat); border-top-left-radius: 0; }
        
        /* Input Area */
        .input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 8px; align-items: center; }
        #text-input { flex: 1; padding: 12px; border-radius: 20px; border: none; font-size: 16px; }

        /* Modals */
        .modal-full { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index:1000; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .btn-action { padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <nav id="navbar" class="hidden">
        <div class="logo">KELVIN 🏖️</div>
        <div class="nav-links">
            <button onclick="showView('page-lobby')">👥 Groupes</button>
            <button onclick="showView('page-confessions')">🤫 Mur</button>
            <button onclick="startCoupDeFoudre()">⚡ Flash</button>
            <button onclick="showView('page-settings')">⚙️ Profil</button>
        </div>
    </nav>

    <!-- INSCRIPTION -->
    <section id="page-signup" class="view">
        <div class="card" style="margin: auto;">
            <h2>Inscription ❤️</h2>
            <input id="nom" type="text" placeholder="Ton prénom">
            <div style="display:flex; gap:10px;">
                <button class="btn-action" style="flex:1; background:#eee; color:#333;" id="m-btn" onclick="setSex('garcon')">👨 Garçon</button>
                <button class="btn-action" style="flex:1; background:#eee; color:#333;" id="f-btn" onclick="setSex('fille')">👩 Fille</button>
            </div>
            <input type="file" onchange="previewPhoto(event, 'preview')">
            <center><img id="preview" style="width:60px; height:60px; border-radius:50%; display:none; object-fit:cover;"></center>
            <button class="btn-action" style="background:var(--secondary);" onclick="startAdventure()">Entrer sur la Plage 🏖️</button>
        </div>
    </section>

    <!-- LOBBY -->
    <section id="page-lobby" class="view hidden">
        <div id="groupes-list"></div>
    </section>

    <!-- MUR DES CONFESSIONS -->
    <section id="page-confessions" class="view hidden">
        <div style="padding:15px; background:var(--primary); color:white; text-align:center;">🤫 Mur des Confessions</div>
        <div id="confessions-list"></div>
        <div class="input-area">
            <input id="conf-input" type="text" placeholder="Dis un secret anonyme...">
            <button onclick="postConfession()" class="btn-action">🤫</button>
        </div>
    </section>

    <!-- MODIFIER PROFIL -->
    <section id="page-settings" class="view hidden">
        <div class="card" style="margin: auto;">
            <h2>Mon Profil <span id="my-badge"></span></h2>
            <input id="edit-nom" type="text" placeholder="Changer de nom">
            <select id="edit-mood" style="padding:10px; border-radius:8px;">
                <option value="🏝️">🏝️ En mode plage</option>
                <option value="📚">📚 En révision</option>
                <option value="🍔">🍔 J'ai faim</option>
                <option value="🔥">🔥 Chaud pour sortir</option>
                <option value="😴">😴 Fatigué</option>
            </select>
            <input type="file" onchange="previewPhoto(event, 'edit-preview')">
            <center><img id="edit-preview" style="width:60px; height:60px; border-radius:50%; object-fit:cover;"></center>
            <button class="btn-action" style="background:var(--secondary);" onclick="saveProfile()">Enregistrer</button>
            <button onclick="deconnecter()">Quitter l'Appli</button>
        </div>
    </section>

    <!-- CHAT -->
    <section id="page-chat" class="view hidden">
        <div class="chat-container">
            <div class="chat-header" style="background:var(--primary); color:white; padding:10px; display:flex; align-items:center; gap:10px;">
                <button onclick="showView('page-lobby')" style="background:none; border:none; color:white; font-size:24px;">←</button>
                <img id="chat-img" style="width:35px; height:35px; border-radius:50%; background:white;">
                <div>
                    <b id="chat-name">Nom</b><br>
                    <small id="chat-typing" style="font-style:italic; display:none;">écrit...</small>
                </div>
            </div>
            <div id="messages-box"></div>
            <div class="input-area">
                <input id="text-input" type="text" placeholder="Message..." oninput="notifyTyping()">
                <button onclick="sendMsg()" class="btn-send" style="background:var(--primary); color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;">➤</button>
            </div>
        </div>
    </section>

    <!-- MODAL CHOIX -->
    <div id="modal-choice" class="modal-full hidden">
        <div class="card">
            <h3 id="choice-name">Option</h3>
            <button class="btn-action" onclick="startPrivate()">💬 Message Privé</button>
            <button class="btn-action" style="background:var(--secondary);" onclick="joinThisGroup()">👥 Rejoindre son Groupe</button>
            <button onclick="closeModals()">Annuler</button>
        </div>
    </div>
</div>

<script>
    const S_URL = "https://doovevgkmarozjululkr.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvb3ZldmdrbWFyb3pqdWx1bGtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyOTE3MzMsImV4cCI6MjA5Njg2NzczM30.Iao5_dnv4j71IPSpy-rdWGR0NPzDEUBMERPFVE8o1G0";
    const sb = supabase.createClient(S_URL, S_KEY);

    let me = null, target = null, activeGroup = null, mySex = "";

    function setSex(s) { mySex = s; document.getElementById('m-btn').style.background = s==='garcon'?'#dcf8c6':'#eee'; document.getElementById('f-btn').style.background = s==='fille'?'#dcf8c6':'#eee'; }
    function previewPhoto(e, id) { const reader = new FileReader(); reader.onload = () => { document.getElementById(id).src = reader.result; document.getElementById(id).style.display = 'block'; }; reader.readAsDataURL(e.target.files[0]); }
    function closeModals() { document.querySelectorAll('.modal-full').forEach(m => m.classList.add('hidden')); }
    function getBadge(count) { if(count > 500) return '👑'; if(count > 200) return '😎'; return '🌱'; }

    // --- INSCRIPTION ---
    async function startAdventure() {
        const nom = document.getElementById('nom').value; const photo = document.getElementById('preview').src;
        if(!nom || !mySex || !photo) return alert("Remplis tout !");
        let { data: grp } = await sb.from('groups').select('*').limit(1);
        const { data, error } = await sb.from('profiles').insert([{ nom, sexe: mySex, photo, groupe_id: grp[0].id }]).select();
        if(error) return alert(error.message);
        me = data[0]; localStorage.setItem('kelvin_user_id', me.id);
        showView('page-lobby'); initRealtime();
    }

    // --- MUR DES CONFESSIONS ---
    async function postConfession() {
        const input = document.getElementById('conf-input');
        if(!input.value) return;
        await sb.from('confessions').insert([{ texte: input.value }]);
        input.value = "";
    }

    async function loadConfessions() {
        const { data } = await sb.from('confessions').select('*').order('created_at', { ascending: false });
        document.getElementById('confessions-list').innerHTML = data.map(c => `
            <div class="confession-card">" ${c.texte} "</div>
        `).join('');
    }

    // --- FLASH RANDOM (COUP DE FOUDRE) ---
    async function startCoupDeFoudre() {
        const opposé = me.sexe === 'fille' ? 'garcon' : 'fille';
        const { data } = await sb.from('profiles').select('*').eq('sexe', opposé).limit(10);
        if(data.length === 0) return alert("Personne pour le moment... 🏖️");
        target = data[Math.floor(Math.random() * data.length)];
        activeGroup = null;
        alert("⚡ COUP DE FOUDRE ! Tu as été jumelé avec " + target.nom);
        showView('page-chat');
    }

    // --- LOGIQUE CHAT & TYPING ---
    let typingTimeout;
    function notifyTyping() {
        // Optionnel : Intégrer Supabase Presence ici pour plus de fluidité
    }

    async function sendMsg() {
        const val = document.getElementById('text-input').value; if (!val) return;
        const msgData = { expediteur_id: me.id, texte: val };
        if (activeGroup) msgData.group_id = activeGroup; else msgData.destinataire_id = target.id;
        
        await sb.from('messages').insert([msgData]);
        await sb.from('profiles').update({ msg_count: me.msg_count + 1 }).eq('id', me.id);
        me.msg_count++;
        
        document.getElementById('text-input').value = "";
        loadMessages();
    }

    async function loadMessages() {
        if(!me || (!target && !activeGroup)) return;
        let query = sb.from('messages').select('*');
        if (activeGroup) query = query.eq('group_id', activeGroup);
        else query = query.or(`and(expediteur_id.eq.${me.id},destinataire_id.eq.${target.id}),and(expediteur_id.eq.${target.id},destinataire_id.eq.${me.id})`);
        
        const { data } = await query.order('created_at', { ascending: true });
        document.getElementById('messages-box').innerHTML = data.map(m => `
            <div class="bulle ${m.expediteur_id === me.id ? 'moi' : 'autre'}">${m.texte}</div>
        `).join('');
        document.getElementById('messages-box').scrollTop = document.getElementById('messages-box').scrollHeight;
    }

    // --- PROFIL & SETTINGS ---
    async function saveProfile() {
        const newNom = document.getElementById('edit-nom').value || me.nom;
        const newMood = document.getElementById('edit-mood').value;
        const newPhoto = document.getElementById('edit-preview').src || me.photo;
        const { data } = await sb.from('profiles').update({ nom: newNom, mood: newMood, photo: newPhoto }).eq('id', me.id).select();
        me = data[0]; alert("Modifié !"); showView('page-lobby');
    }

    // --- LOBBY ---
    async function renderLobby() {
        const { data: users } = await sb.from('profiles').select('*');
        const { data: grps } = await sb.from('groups').select('*');
        document.getElementById('groupes-list').innerHTML = grps.map(g => {
            const mbs = users.filter(u => u.groupe_id === g.id);
            return `<div class="groupe-item" onclick="activeGroup='${g.id}'; tryJoinGroup('${g.id}')">
                <b>${g.nom} (${mbs.length}/10)</b>
                <div class="membres-grid">${mbs.map(m => `
                    <div class="avatar-wrap" onclick='openChoice(event, ${JSON.stringify(m)})'>
                        <span class="badge">${getBadge(m.msg_count)}</span>
                        <img class="avatar-img" src="${m.photo}">
                        <small>${m.nom}</small>
                        <span class="mood-tag">${m.mood}</span>
                    </div>`).join('')}</div>
            </div>`;
        }).join('');
    }

    // --- SYSTEM ---
    function openChoice(e, userObj) { e.stopPropagation(); if (userObj.id === me.id) return; target = userObj; document.getElementById('choice-name').innerText = userObj.nom; document.getElementById('modal-choice').classList.remove('hidden'); }
    function startPrivate() { if (target.sexe === me.sexe) return alert("Interdit entre même sexe ! 🏖️"); activeGroup = null; closeModals(); showView('page-chat'); }
    function joinThisGroup() { activeGroup = target.groupe_id; closeModals(); tryJoinGroup(activeGroup); }
    async function tryJoinGroup(gid) { await sb.from('profiles').update({ groupe_id: gid }).eq('id', me.id); me.groupe_id = gid; showView('page-chat'); }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('navbar').classList.toggle('hidden', id === 'page-signup');
        if (id === 'page-lobby') renderLobby();
        if (id === 'page-confessions') loadConfessions();
        if (id === 'page-settings') { 
            document.getElementById('edit-nom').value = me.nom; 
            document.getElementById('edit-preview').src = me.photo; 
            document.getElementById('my-badge').innerText = getBadge(me.msg_count);
        }
    }

    function initRealtime() {
        sb.channel('db-all').on('postgres_changes', { event: '*', schema: 'public' }, () => {
            renderLobby();
            if(document.getElementById('page-chat').classList.contains('active') || !document.getElementById('page-chat').classList.contains('hidden')) loadMessages();
            if(!document.getElementById('page-confessions').classList.contains('hidden')) loadConfessions();
        }).subscribe();
    }

    async function deconnecter() { if(me) await sb.from('profiles').delete().eq('id', me.id); localStorage.clear(); location.reload(); }

    window.onload = async () => {
        const id = localStorage.getItem('kelvin_user_id');
        if (id) { const { data } = await sb.from('profiles').select('*').eq('id', id).single(); if(data) { me = data; showView('page-lobby'); initRealtime(); } }
    };
</script>
</body>
</html>
