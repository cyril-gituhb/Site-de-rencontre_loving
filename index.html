<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kELVIN Loving ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- PAGE 1 : INSCRIPTION -->
<section id="page-signup" class="page active">
  <div class="card">
    <h1>kELVIN Loving</h1>
    <p class="subtitle">Vacances entre étudiants ❤️</p>
    
    <input id="nom" placeholder="Ton prénom" maxlength="15">
    
    <div class="sexe-box">
      <button type="button" class="sexe-btn" data-sexe="fille">👩 Fille</button>
      <button type="button" class="sexe-btn" data-sexe="garcon">👨 Garçon</button>
    </div>
    <input type="hidden" id="sexe">

    <label class="upload">
      <input type="file" id="photo" accept="image/*">
      <span>📷 Ajouter ta photo</span>
    </label>
    <img id="preview">

    <button onclick="sInscrire()">Rejoindre un groupe</button>
    <p class="note">5 filles + 5 garçons par groupe. Chat privé 1vs1 seulement.</p>
  </div>
</section>

<!-- PAGE 2 : LOBBY -->
<section id="page-lobby" class="page">
  <header>
    <h1>Groupes de 10</h1>
    <button onclick="deconnecter()">Déconnecter</button>
  </header>
  <div id="groupes"></div>
</section>

<!-- PAGE 3 : CHAT -->
<section id="page-chat" class="page">
  <div class="chat-container">
    <div class="sidebar">
      <h3>Choisis ton crush ❤️</h3>
      <div id="membres"></div>
      <button class="back" onclick="retourLobby()">← Retour lobby</button>
    </div>
    <div class="chat-main">
      <div class="chat-header" id="chat-header">Sélectionne une personne</div>
      <div class="messages" id="messages"></div>
      <div class="input-box">
        <input id="msg" placeholder="Écris ton message..." onkeypress="if(event.key==='Enter') envoyer()">
        <button onclick="envoyer()">Envoyer</button>
      </div>
    </div>
  </div>
</section>

<script src="app.js"></script>
</body>
</html>
