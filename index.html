<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KELVIN LOVING - Site de Rencontre</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff2d55;
            --primary-light: #ff6b7a;
            --gray-light: #f5f5f5;
            --gray-medium: #e0e0e0;
            --gray-dark: #333;
            --white: #fff;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--white);
            color: var(--gray-dark);
            overflow: hidden;
        }

        /* HEADER */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--white);
            border-bottom: 1px solid var(--gray-medium);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-logout {
            padding: 8px 16px;
            background: var(--gray-light);
            border: none;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-logout:hover {
            background: var(--gray-medium);
        }

        /* MAIN CONTAINER */
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--white);
        }

        /* PAGE */
        .page {
            display: none;
            flex: 1;
            margin-top: 60px;
            overflow-y: auto;
            animation: fadeIn 0.3s ease-in;
        }

        .page.active {
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* AUTH PAGES */
        .auth-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 24px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 32px;
            color: var(--gray-dark);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--gray-dark);
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--gray-medium);
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: border 0.2s;
        }

        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 45, 85, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .btn-primary:hover {
            background: var(--primary-light);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: var(--gray-light);
            color: var(--gray-dark);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background: var(--gray-medium);
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--gray-dark);
        }

        .auth-toggle a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .error-message {
            padding: 12px;
            background: #ffe0e0;
            color: #d32f2f;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .file-input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 24px;
            border: 2px dashed var(--gray-medium);
            border-radius: 12px;
            background: var(--gray-light);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-dark);
        }

        .file-input-label:hover {
            border-color: var(--primary);
            background: rgba(255, 45, 85, 0.05);
        }

        .file-input-label.has-file {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
        }

        #photoInput {
            display: none;
        }

        /* SWIPE PAGE */
        .swipe-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .card {
            width: 100%;
            max-width: 100%;
            height: 500px;
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            animation: cardEnter 0.4s ease-out;
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes cardExit {
            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }

        .card.exit-right {
            animation: cardExit 0.3s ease-out forwards;
        }

        .card-image {
            width: 100%;
            height: 60%;
            object-fit: cover;
            background: var(--gray-light);
        }

        .card-info {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--gray-dark);
        }

        .card-details {
            font-size: 14px;
            color: #999;
        }

        .card-bio {
            font-size: 13px;
            color: #666;
            line-height: 1.4;
            margin-top: 8px;
        }

        .swipe-buttons {
            display: flex;
            gap: 24px;
            justify-content: center;
            margin-top: 24px;
            padding: 0 16px;
        }

        .btn-action {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }

        .btn-like {
            background: var(--primary);
            color: var(--white);
        }

        .btn-like:active {
            transform: scale(0.9);
            box-shadow: 0 2px 8px rgba(255, 45, 85, 0.4);
        }

        .btn-pass {
            background: var(--gray-light);
            color: var(--gray-dark);
        }

        .btn-pass:active {
            transform: scale(0.9);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .empty-message {
            text-align: center;
            font-size: 18px;
            color: #999;
            padding: 40px 24px;
        }

        /* CHAT PAGE */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--white);
        }

        .chat-header {
            padding: 16px;
            border-bottom: 1px solid var(--gray-medium);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--gray-light);
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--gray-dark);
        }

        .btn-back {
            width: 40px;
            height: 40px;
            border: none;
            background: var(--gray-light);
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-back:hover {
            background: var(--gray-medium);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafafa;
        }

        .message {
            display: flex;
            margin-bottom: 8px;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.mine {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
        }

        .message.mine .message-bubble {
            background: var(--primary);
            color: var(--white);
            border-bottom-right-radius: 4px;
        }

        .message.theirs .message-bubble {
            background: var(--gray-light);
            color: var(--gray-dark);
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
            padding: 0 8px;
        }

        .chat-input-container {
            padding: 12px 16px;
            border-top: 1px solid var(--gray-medium);
            display: flex;
            gap: 8px;
            background: var(--white);
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--gray-medium);
            border-radius: 20px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            max-height: 100px;
            resize: none;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-send {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: var(--white);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 18px;
        }

        .btn-send:active {
            transform: scale(0.9);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-state {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 20px;
            font-size: 14px;
            color: #999;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .card {
                height: 450px;
            }

            .auth-container {
                padding: 16px;
            }

            .btn-action {
                width: 56px;
                height: 56px;
                font-size: 28px;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gray-medium);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="header-title">KELVIN LOVING ❤️</div>
            <div class="header-actions">
                <button id="btnLogout" class="btn-logout" style="display: none;">Déconnexion</button>
            </div>
        </div>

        <!-- AUTH - SIGNUP PAGE -->
        <div id="pageSignup" class="page">
            <div class="auth-container">
                <h1 class="auth-title">Bienvenue</h1>
                <div id="errorSignup" class="error-message"></div>
                
                <div class="file-input-wrapper">
                    <label for="photoInput" class="file-input-label" id="photoLabel">
                        📸 Ajouter une photo
                    </label>
                    <input type="file" id="photoInput" accept="image/*">
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="signupEmail" class="form-input" placeholder="votre@email.com">
                </div>

                <div class="form-group">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" id="signupPassword" class="form-input" placeholder="Min. 6 caractères">
                </div>

                <div class="form-group">
                    <label class="form-label">Prénom</label>
                    <input type="text" id="signupName" class="form-input" placeholder="Votre prénom">
                </div>

                <div class="form-group">
                    <label class="form-label">Âge</label>
                    <input type="number" id="signupAge" class="form-input" placeholder="18">
                </div>

                <div class="form-group">
                    <label class="form-label">Bio</label>
                    <textarea id="signupBio" class="form-textarea" placeholder="Parlez de vous..."></textarea>
                </div>

                <button id="btnSignup" class="btn-primary">S'inscrire</button>
                
                <div class="auth-toggle">
                    Déjà inscrit ? <a onclick="showLogin()">Se connecter</a>
                </div>
            </div>
        </div>

        <!-- AUTH - LOGIN PAGE -->
        <div id="pageLogin" class="page active">
            <div class="auth-container">
                <h1 class="auth-title">Connexion</h1>
                <div id="errorLogin" class="error-message"></div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="loginEmail" class="form-input" placeholder="votre@email.com">
                </div>

                <div class="form-group">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="Votre mot de passe">
                </div>

                <button id="btnLogin" class="btn-primary">Se connecter</button>
                
                <div class="auth-toggle">
                    Pas encore inscrit ? <a onclick="showSignup()">S'inscrire</a>
                </div>
            </div>
        </div>

        <!-- SWIPE PAGE -->
        <div id="pageSwipe" class="page">
            <div class="swipe-container">
                <div id="cardsContainer"></div>
                <div class="swipe-buttons">
                    <button id="btnPass" class="btn-action btn-pass">✖️</button>
                    <button id="btnLike" class="btn-action btn-like">❤️</button>
                </div>
            </div>
        </div>

        <!-- CHAT PAGE -->
        <div id="pageChat" class="page">
            <div class="chat-container">
                <div class="chat-header">
                    <button id="btnBackToSwipe" class="btn-back">←</button>
                    <img id="matchAvatar" class="chat-avatar" src="" alt="Avatar">
                    <div class="chat-header-info">
                        <div id="matchName" class="chat-name"></div>
                    </div>
                </div>
                <div id="messagesContainer" class="messages-container"></div>
                <div class="chat-input-container">
                    <textarea id="chatInput" class="chat-input" placeholder="Votre message..." rows="1"></textarea>
                    <button id="btnSendMessage" class="btn-send">📤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== CONFIG SUPABASE ==========
        const SUPABASE_URL = 'https://ghcaswgaghzvyvmzkyb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_6esKiXhMugGI-uwJw8ZKTA_5vnyK0cQ';

        // ========== VARIABLES GLOBALES ==========
        let supabase;
        let currentUser = null;
        let currentUserProfile = null;
        let currentMatch = null;
        let currentMatchProfile = null;
        let allProfiles = [];
        let profileIndex = 0;
        let uploadedPhotoFile = null;
        let realtimeSubscription = null;

        // ========== INITIALISATION ==========
        async function init() {
            const { createClient } = window.supabase;
            supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

            // Vérifier si utilisateur déjà connecté
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                currentUser = user;
                await loadCurrentUserProfile();
                showSwipe();
                loadProfiles();
            } else {
                showLogin();
            }
        }

        // ========== AUTH - SIGNUP ==========
        document.getElementById('photoInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                uploadedPhotoFile = file;
                document.getElementById('photoLabel').textContent = `📸 ${file.name}`;
                document.getElementById('photoLabel').classList.add('has-file');
            }
        });

        document.getElementById('btnSignup').addEventListener('click', async () => {
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const name = document.getElementById('signupName').value.trim();
            const age = parseInt(document.getElementById('signupAge').value);
            const bio = document.getElementById('signupBio').value.trim();

            clearError('errorSignup');

            if (!email || !password || !name || !age || !bio) {
                showError('errorSignup', 'Tous les champs sont requis');
                return;
            }

            if (password.length < 6) {
                showError('errorSignup', 'Le mot de passe doit avoir au moins 6 caractères');
                return;
            }

            if (age < 18) {
                showError('errorSignup', 'Vous devez avoir au moins 18 ans');
                return;
            }

            try {
                // Signup
                const { data: { user }, error: signupError } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            display_name: name,
                            age: age,
                            bio: bio
                        }
                    }
                });

                if (signupError) throw signupError;

                currentUser = user;

                // Upload photo si existe
                let photoUrl = null;
                if (uploadedPhotoFile) {
                    const fileName = `${user.id}-${Date.now()}.jpg`;
                    const { error: uploadError } = await supabase.storage
                        .from('avatars')
                        .upload(fileName, uploadedPhotoFile);

                    if (!uploadError) {
                        const { data } = supabase.storage
                            .from('avatars')
                            .getPublicUrl(fileName);
                        photoUrl = data.publicUrl;
                    }
                }

                // Créer profile
                const { error: profileError } = await supabase
                    .from('profiles')
                    .insert({
                        id: user.id,
                        display_name: name,
                        age: age,
                        bio: bio,
                        photo_url: photoUrl
                    });

                if (profileError) throw profileError;

                await loadCurrentUserProfile();
                showSwipe();
                loadProfiles();
                
            } catch (err) {
                console.error('Erreur signup:', err);
                showError('errorSignup', err.message || 'Erreur lors de l\'inscription');
            }
        });

        // ========== AUTH - LOGIN ==========
        document.getElementById('btnLogin').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            clearError('errorLogin');

            if (!email || !password) {
                showError('errorLogin', 'Email et mot de passe requis');
                return;
            }

            try {
                const { data: { user }, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                currentUser = user;
                await loadCurrentUserProfile();
                showSwipe();
                loadProfiles();

            } catch (err) {
                console.error('Erreur login:', err);
                showError('errorLogin', err.message || 'Email ou mot de passe incorrect');
            }
        });

        // ========== LOGOUT ==========
        document.getElementById('btnLogout').addEventListener('click', async () => {
            await supabase.auth.signOut();
            currentUser = null;
            currentUserProfile = null;
            currentMatch = null;
            profileIndex = 0;
            allProfiles = [];
            unsubscribeChat();
            showLogin();
            clearAllInputs();
        });

        // ========== LOAD CURRENT USER PROFILE ==========
        async function loadCurrentUserProfile() {
            try {
                const { data, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', currentUser.id)
                    .single();

                if (error) throw error;
                currentUserProfile = data;
            } catch (err) {
                console.error('Erreur load profile:', err);
            }
        }

        // ========== LOAD ALL PROFILES (SWIPE) ==========
        async function loadProfiles() {
            try {
                const { data, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .neq('id', currentUser.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                allProfiles = data || [];
                profileIndex = 0;

                if (allProfiles.length === 0) {
                    document.getElementById('cardsContainer').innerHTML = '<div class="empty-message">Aucun profil disponible</div>';
                } else {
                    renderCard();
                }
            } catch (err) {
                console.error('Erreur load profiles:', err);
                document.getElementById('cardsContainer').innerHTML = '<div class="empty-message">Erreur réseau</div>';
            }
        }

        // ========== RENDER CARD ==========
        function renderCard() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            if (profileIndex >= allProfiles.length) {
                container.innerHTML = '<div class="empty-message">Plus de profils 😢</div>';
                return;
            }

            const profile = allProfiles[profileIndex];
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${profile.photo_url || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22200%22 height=%22200%22/%3E%3C/svg%3E'}" alt="Photo" class="card-image" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22200%22 height=%22200%22/%3E%3C/svg%3E'">
                <div class="card-info">
                    <div>
                        <div class="card-name">${profile.display_name}, ${profile.age}</div>
                        <div class="card-bio">${profile.bio || 'Bio non renseignée'}</div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        }

        // ========== LIKE (MATCH) ==========
        document.getElementById('btnLike').addEventListener('click', async () => {
            if (profileIndex >= allProfiles.length) return;

            const profile = allProfiles[profileIndex];
            
            try {
                document.getElementById('btnLike').disabled = true;

                // Appeler Edge Function pour créer/obtenir conversation
                const { data, error } = await supabase.functions.invoke('get-or-create-dm', {
                    body: {
                        user_id_1: currentUser.id,
                        user_id_2: profile.id
                    }
                });

                if (error) throw error;

                if (data && data.conversation_id) {
                    // Match créé
                    currentMatch = data.conversation_id;
                    currentMatchProfile = profile;
                    document.getElementById('btnLike').disabled = false;
                    showChat();
                    loadMessages();
                    subscribeToChat();
                } else {
                    // Pas de match, passer au suivant
                    nextProfile();
                    document.getElementById('btnLike').disabled = false;
                }
            } catch (err) {
                console.error('Erreur like:', err);
                nextProfile();
                document.getElementById('btnLike').disabled = false;
            }
        });

        // ========== PASS ==========
        document.getElementById('btnPass').addEventListener('click', () => {
            const card = document.querySelector('.card');
            if (card) {
                card.classList.add('exit-right');
                setTimeout(nextProfile, 300);
            } else {
                nextProfile();
            }
        });

        function nextProfile() {
            profileIndex++;
            renderCard();
        }

        // ========== CHAT - LOAD MESSAGES ==========
        async function loadMessages() {
            try {
                const { data, error } = await supabase
                    .from('messages')
                    .select('*')
                    .eq('conversation_id', currentMatch)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                const messagesContainer = document.getElementById('messagesContainer');
                messagesContainer.innerHTML = '';

                (data || []).forEach(msg => {
                    addMessageToUI(msg);
                });

                // Scroll vers le bas
                setTimeout(() => {
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }, 100);
            } catch (err) {
                console.error('Erreur load messages:', err);
            }
        }

        // ========== CHAT - ADD MESSAGE UI ==========
        function addMessageToUI(message) {
            const messagesContainer = document.getElementById('messagesContainer');
            const isOwn = message.sender_id === currentUser.id;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isOwn ? 'mine' : 'theirs'}`;
            
            const time = new Date(message.created_at).toLocaleTimeString('fr-FR', {
                hour: '2-digit',
                minute: '2-digit'
            });
            
            msgDiv.innerHTML = `
                <div>
                    <div class="message-bubble">${escapeHtml(message.body)}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;
            
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // ========== CHAT - SEND MESSAGE ==========
        document.getElementById('btnSendMessage').addEventListener('click', async () => {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();

            if (!text) return;

            try {
                const { error } = await supabase
                    .from('messages')
                    .insert({
                        conversation_id: currentMatch,
                        sender_id: currentUser.id,
                        body: text
                    });

                if (error) throw error;

                input.value = '';
                input.style.height = 'auto';
            } catch (err) {
                console.error('Erreur send message:', err);
            }
        });

        // Auto-resize textarea
        document.getElementById('chatInput').addEventListener('input', (e) => {
            e.target.style.height = 'auto';
            e.target.style.height = Math.min(e.target.scrollHeight, 100) + 'px';
        });

        // Send on Enter (but not on mobile)
        document.getElementById('chatInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 600) {
                e.preventDefault();
                document.getElementById('btnSendMessage').click();
            }
        });

        // ========== CHAT - REALTIME SUBSCRIPTION ==========
        function subscribeToChat() {
            unsubscribeChat();

            realtimeSubscription = supabase
                .channel(`chat-${currentMatch}`)
                .on(
                    'postgres_changes',
                    {
                        event: 'INSERT',
                        schema: 'public',
                        table: 'messages',
                        filter: `conversation_id=eq.${currentMatch}`
                    },
                    (payload) => {
                        addMessageToUI(payload.new);
                    }
                )
                .subscribe();
        }

        function unsubscribeChat() {
            if (realtimeSubscription) {
                supabase.removeChannel(realtimeSubscription);
                realtimeSubscription = null;
            }
        }

        // ========== NAVIGATION ==========
        function showSignup() {
            clearAllInputs();
            setActivePage('pageSignup');
            document.getElementById('btnLogout').style.display = 'none';
        }

        function showLogin() {
            clearAllInputs();
            setActivePage('pageLogin');
            document.getElementById('btnLogout').style.display = 'none';
        }

        function showSwipe() {
            setActivePage('pageSwipe');
            document.getElementById('btnLogout').style.display = 'block';
        }

        function showChat() {
            setActivePage('pageChat');
            document.getElementById('btnLogout').style.display = 'block';

            // Remplir header chat
            document.getElementById('matchName').textContent = `${currentMatchProfile.display_name}, ${currentMatchProfile.age}`;
            document.getElementById('matchAvatar').src = currentMatchProfile.photo_url || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22200%22 height=%22200%22/%3E%3C/svg%3E';
        }

        function setActivePage(pageId) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
        }

        // ========== BACK TO SWIPE ==========
        document.getElementById('btnBackToSwipe').addEventListener('click', () => {
            unsubscribeChat();
            currentMatch = null;
            currentMatchProfile = null;
            showSwipe();
        });

        // ========== UTILS ==========
        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.add('show');
        }

        function clearError(elementId) {
            const el = document.getElementById(elementId);
            el.textContent = '';
            el.classList.remove('show');
        }

        function clearAllInputs() {
            document.querySelectorAll('input, textarea').forEach(el => {
                if (el.type !== 'file') el.value = '';
            });
            document.getElementById('photoLabel').textContent = '📸 Ajouter une photo';
            document.getElementById('photoLabel').classList.remove('has-file');
            uploadedPhotoFile = null;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== DÉMARRAGE ==========
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
