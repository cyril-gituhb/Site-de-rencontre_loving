<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelvin Loving 🏖️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <!-- Section Inscription -->
    <section id="auth-section">
        <div class="heart-container">
            <form id="register-form">
                <h1>Kelvin Loving</h1>
                <p>L'amour étudiant 🏖️</p>
                
                <input type="text" placeholder="Nom complet" required>
                <input type="email" placeholder="Email universitaire" required>
                <input type="tel" placeholder="Numéro de téléphone" required>
                
                <div class="row">
                    <select id="gender" required>
                        <option value="">Sexe</option>
                        <option value="F">Fille</option>
                        <option value="M">Garçon</option>
                    </select>
                    <input type="file" id="photo" accept="image/*">
                </div>

                <input type="password" placeholder="Mot de passe" required>
                <button type="submit">Rejoindre l'aventure</button>
            </form>
        </div>
    </section>

    <!-- Section Chat (Masquée par défaut) -->
    <section id="chat-section" class="hidden">
        <div class="sidebar">
            <div class="user-profile">
                <img src="https://via.placeholder.com/50" id="my-avatar">
                <span id="my-name">Étudiant</span>
            </div>
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('groups')">Groupes (10)</button>
                <button class="tab-btn" onclick="showTab('private')">Privé</button>
            </div>
            <div id="list-container">
                <!-- Groupes ou Utilisateurs en ligne chargés ici via JS -->
            </div>
        </div>

        <div class="chat-window">
            <div class="chat-header">
                <span id="chat-title">Groupe Alpha (5F/5G)</span>
                <span id="status-indicator">● En ligne</span>
            </div>
            
            <div class="chat-messages" id="chat-box">
                <!-- L'image de fond sera mise ici via CSS -->
                <div class="message received">Bienvenue sur Kelvin Loving ! 👋</div>
            </div>

            <div class="chat-input-area">
                <button class="icon-btn"><i class="fas fa-microphone"></i></button>
                <input type="text" placeholder="Écrivez votre message...">
                <button class="send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
