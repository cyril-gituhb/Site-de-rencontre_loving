<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KELVIN LOVING 🏖️</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --accent: #ff4d6d; --gradient: linear-gradient(135deg, #ff4e50, #f9d423); 
            --purple: #6a1b9a; --dark: #1a1a1a; --red-chat: #ff4b2b; --blue-chat: #0077b6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: #90e0ef; }
        body { display: flex; justify-content: center; align-items: center; }
        #app { width: 100vw; height: 100%; display: flex; flex-direction: column; background: white; position: relative; overflow: hidden; }
        @media (min-width: 600px) { #app { width: 400px; height: 92vh; border-radius: 30px; border: 8px solid #333; } }

        /* NAVBAR */
        nav { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .logo-text { font-size: 18px; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-icons { display: flex; gap: 15px; }
        .nav-icons button { background: none; border: none; font-size: 22px; cursor: pointer; }

        .view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .hidden { display: none !important; }

        /* FORMULAIRE D'INSCRIPTION AMÉLIORÉ */
        #page-auth { background: var(--gradient); justify-content: center; align-items: center; padding: 20px; }
        .auth-card { background: white; padding: 30px; border-radius: 25px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .auth-card h2 { margin-bottom: 20px; font-size: 22px; color: var(--dark); }
        .auth-card input, .auth-card select { 
            width: 100%; padding: 14px; margin-bottom: 12px; border: 1.5px solid #eee; 
            border-radius: 12px; font-size: 14px; outline: none; transition: 0.3s;
        }
        .auth-card input:focus { border-color: var(--accent); background: #fffcfd; }
        .file-label { 
            display: block; padding: 10px; background: #f8f9fa; border: 1px dashed #ccc; 
            border-radius: 10px; margin-bottom: 10px; cursor: pointer; font-size: 13px; color: #666;
        }

        /* VITESSE & CHARGEMENT */
        #mur-list, #discover-feed, #matches-list, #messages-box { 
            flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; 
        }
        .conf-item { background: white; padding: 15px; border-radius: 15px 15px 15px 0; margin-bottom: 12px; border-left: 5px solid var(--purple); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* CARDS */
        #discover-feed { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .profile-card { height: 180px; border-radius: 18px; position: relative; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); background: #eee; }
        .profile-img { width: 100%; height: 100%; object-fit: cover; }
        .profile-info { position: absolute; bottom: 0; padding: 8px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white; width: 100%; font-size: 11px; }

        /* CHAT BULLS */
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 14px; color: white; margin-bottom: 5px; }
        .msg.moi { align-self: flex-end; background: var(--red-chat); border-bottom-right-radius: 2px; }
        .msg.autre { align-self: flex-start; background: var(--blue-chat); border-bottom-left-radius: 2px; }

        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 15px; background: var(--dark); color: white; font-weight: bold; cursor: pointer; }
        #guide-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index: 5000; color:white; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:40px; text-align:center; }
    </style>
</head>
<body>

<div id="app">
    <nav id="navbar" class="hidden">
        <div class="logo-text">KELVIN 🏖️</div>
        <div class="nav-icons">
            <button onclick="showView('page-lobby')">🔥</button>
            <button onclick="showView('page-mur')">🤫</button>
            <button onclick="autoSearch()">⚡</button>
            <button onclick="showView('page-matches')">💬</button>
        </div>
    </nav>

    <div id="guide-overlay" class="hidden">
        <h2 style="color:var(--accent); margin-bottom:20px;">Guide KELVIN 🏖️</h2>
        <p>🔥 Flammes : Likez<br>🤫 Mur : Secrets anonymes<br>⚡ Flash : Chat rapide<br>💬 Match : Discutez</p>
        <button class="btn-main" style="background:var(--accent); margin-top:20px;" onclick="closeGuide()">C'EST PARTI !</button>
    </div>

    <section id="page-auth" class="view">
        <div class="auth-card">
            <h2>Bienvenue ❤️</h2>
            <input id="auth-email" type="email" placeholder="Ton Email">
            <div id="signup-fields" class="hidden">
                <input id="auth-nom" type="text" placeholder="Ton Prénom">
                <select id="auth-sexe">
                    <option value="fille">👩 Fille</option>
                    <option value="garcon">👨 Garçon</option>
                </select>
                <label class="file-label" for="photo-in">📸 Choisir une photo de profil</label>
                <input type="file" id="photo-in" class="hidden" onchange="preview(event)">
                <center><img id="pre-img" style="width:60px; height:60px; border-radius:50%; display:none; object-fit:cover; margin-bottom:10px; border:2px solid var(--accent);"></center>
            </div>
            <input id="auth-pass" type="password" placeholder="Ton Mot de passe" class="hidden">
            <button class="btn-main" id="auth-btn" onclick="handleAuth()">CONTINUER</button>
        </div>
    </section>

    <section id="page-mur" class="view hidden">
        <div id="mur-list"></div>
        <div style="padding:10px; display:flex; gap:8px; background:white; border-top:1px solid #eee;">
            <input id="mur-input" type="text" style="flex:1; padding:12px; border-radius:20px; border:1px solid #ddd;" placeholder="Secret anonyme...">
            <button onclick="postMur()" style="background:var(--purple); color:white; border:none; width:45px; height:45px; border-radius:50%;">🤫</button>
        </div>
    </section>

    <section id="page-lobby" class="view hidden"><div id="discover-feed"></div></section>
    <section id="page-matches" class="view hidden"><div id="matches-list"></div></section>

    <section id="page-chat" class="view hidden">
        <div style="padding:10px; display:flex; align-items:center; gap:10px; border-bottom:1px solid #eee;">
            <button onclick="showView('page-matches')" style="border:none; background:none; font-size:20px;">←</button>
            <img id="chat-img" style="width:35px; height:35px; border-radius:50%;">
            <b id="chat-name">Nom</b>
        </div>
        <div id="messages-box"></div>
        <div style="padding:10px; display:flex; gap:8px; background:white; border-top:1px solid #eee;">
            <input id="text-input" type="text" style="flex:1; padding:12px; border-radius:20px; border:1px solid #ddd;" placeholder="Message...">
            <button onclick="sendMsg()" style="background:var(--accent); color:white; border:none; width:45px; height:45px; border-radius:50%;">➤</button>
        </div>
    </section>
</div>

<script>
    const S_URL = "https://doovevgkmarozjululkr.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvb3ZldmdrbWFyb3pqdWx1bGtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyOTE3MzMsImV4cCI6MjA5Njg2NzczM30.Iao5_dnv4j71IPSpy-rdWGR0NPzDEUBMERPFVE8o1G0";
    const sb = supabase.createClient(S_URL, S_KEY);

    let me = null, target = null, step = 1, cachedUsers = [];

    function preview(e) { const r = new FileReader(); r.onload = () => { document.getElementById('pre-img').src = r.result; document.getElementById('pre-img').style.display='block'; }; r.readAsDataURL(e.target.files[0]); }
    function closeGuide() { document.getElementById('guide-overlay').classList.add('hidden'); localStorage.setItem('kelvin_guide', '1'); }

    async function handleAuth() {
        const btn = document.getElementById('auth-btn'); btn.innerText = "Chargement...";
        const email = document.getElementById('auth-email').value; const pass = document.getElementById('auth-pass').value;
        try {
            if(step === 1) {
                const { data } = await sb.from('profiles').select('*').eq('email', email);
                if(data && data.length > 0) { document.getElementById('auth-pass').classList.remove('hidden'); step = 2; }
                else { document.getElementById('signup-fields').classList.remove('hidden'); document.getElementById('auth-pass').classList.remove('hidden'); step = 3; }
                btn.innerText = "CONTINUER";
            } else if(step === 2) {
                const { data, error } = await sb.from('profiles').select('*').eq('email', email).eq('password', pass).single();
                if(error) throw error; startApp(data);
            } else if(step === 3) {
                const { data, error } = await sb.from('profiles').insert([{ email, password: pass, nom: document.getElementById('auth-nom').value, photo: document.getElementById('pre-img').src, sexe: document.getElementById('auth-sexe').value }]).select();
                if(error) throw error; startApp(data[0]);
            }
        } catch (e) { alert("Erreur d'infos ❤️"); btn.innerText = "CONTINUER"; }
    }

    function startApp(data) {
        me = data; localStorage.setItem('kelvin_user_id', me.id);
        showView('page-lobby'); if(!localStorage.getItem('kelvin_guide')) document.getElementById('guide-overlay').classList.remove('hidden');
        initRealtime();
    }

    // --- OPTIMISATION CHARGEMENT ---
    async function loadMur() {
        const { data } = await sb.from('confessions').select('*').order('created_at', { ascending: false }).limit(20);
        document.getElementById('mur-list').innerHTML = data.map(c => `<div class="conf-item">"${c.texte}"</div>`).join('');
    }

    async function renderFeed() {
        const { data } = await sb.from('profiles').select('*').neq('id', me.id).limit(20);
        cachedUsers = data;
        document.getElementById('discover-feed').innerHTML = data.map(u => `
            <div class="profile-card" onclick="openChat(${JSON.stringify(u).replace(/"/g, '&quot;')})">
                <img src="${u.photo}" class="profile-img">
                <div class="profile-info"><b>${u.nom}</b></div>
            </div>
        `).join('');
    }

    async function autoSearch() {
        const opp = me.sexe === 'fille' ? 'garcon' : 'fille';
        const { data } = await sb.from('profiles').select('*').eq('sexe', opp).neq('id', me.id).limit(10);
        if(!data || data.length === 0) return alert("Personne en ligne... 🏜️");
        openChat(data[Math.floor(Math.random() * data.length)]);
    }

    function openChat(u) { target = u; document.getElementById('chat-name').innerText = target.nom; document.getElementById('chat-img').src = target.photo; showView('page-chat'); loadMsgs(); }
    
    async function sendMsg() {
        const v = document.getElementById('text-input').value; if(!v) return;
        document.getElementById('text-input').value = "";
        await sb.from('messages').insert([{ expediteur_id: me.id, destinataire_id: target.id, texte: v }]);
    }

    async function loadMsgs() {
        const { data } = await sb.from('messages').select('*').or(`and(expediteur_id.eq.${me.id},destinataire_id.eq.${target.id}),and(expediteur_id.eq.${target.id},destinataire_id.eq.${me.id})`).order('created_at', { ascending: true });
        const box = document.getElementById('messages-box');
        box.innerHTML = data.map(m => `<div class="msg ${m.expediteur_id === me.id ? 'moi' : 'autre'}">${m.texte}</div>`).join('');
        box.scrollTop = box.scrollHeight;
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('navbar').classList.toggle('hidden', id === 'page-auth');
        if(id === 'page-lobby') renderFeed();
        if(id === 'page-mur') loadMur();
    }

    function initRealtime() {
        sb.channel('db-changes').on('postgres_changes', { event: '*', schema: 'public' }, (payload) => {
            if(payload.table === 'messages' && !document.getElementById('page-chat').classList.contains('hidden')) loadMsgs();
            if(payload.table === 'confessions' && !document.getElementById('page-mur').classList.contains('hidden')) loadMur();
        }).subscribe();
    }

    window.onload = async () => {
        const id = localStorage.getItem('kelvin_user_id');
        if(id) { const { data } = await sb.from('profiles').select('*').eq('id', id).single(); if(data) startApp(data); }
    };
</script>
</body>
</html>
