<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KELVIN LOVING 🏖️</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --accent: #ff4d6d; 
            --gradient: linear-gradient(135deg, #ff4e50, #f9d423); 
            --dark: #1a1a1a;
            --white: #ffffff;
            --red-chat: #ff4b2b;
            --blue-chat: #0077b6;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: #90e0ef; }
        body { display: flex; justify-content: center; align-items: center; }
        
        #app { width: 100vw; height: 100%; display: flex; flex-direction: column; background: var(--white); position: relative; overflow: hidden; }
        @media (min-width: 600px) { #app { width: 400px; height: 92vh; border-radius: 30px; border: 8px solid #333; } }

        /* NAVBAR */
        nav { background: var(--white); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .logo-text { font-size: 18px; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-icons { display: flex; gap: 15px; }
        .nav-icons button { background: none; border: none; font-size: 24px; cursor: pointer; position: relative; }

        .view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .hidden { display: none !important; }

        /* AUTH */
        #page-auth { background: var(--gradient); justify-content: center; align-items: center; padding: 20px; overflow-y: auto; }
        .auth-card { background: white; padding: 25px; border-radius: 25px; width: 100%; max-width: 340px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #eee; border-radius: 12px; font-size: 15px; outline: none; }
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 15px; background: var(--dark); color: white; font-weight: bold; cursor: pointer; }

        /* FEED & MATCHES LIST */
        #discover-feed, #matches-list { flex: 1; overflow-y: auto; padding: 15px; background: #fdfdfd; }
        #discover-feed { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .profile-card { height: 220px; border-radius: 20px; position: relative; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; }
        .profile-img { width: 100%; height: 100%; object-fit: cover; }
        .profile-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 10px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white; }
        .flame-btn { position: absolute; top: 8px; right: 8px; background: white; border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .match-item { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        .match-avatar { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }

        /* CHAT */
        .chat-container { flex: 1; display: flex; flex-direction: column; background: #f0f2f5; height: 100%; }
        #messages-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 14px; color: white; }
        .msg.moi { align-self: flex-end; background: var(--red-chat); border-bottom-right-radius: 2px; }
        .msg.autre { align-self: flex-start; background: var(--blue-chat); border-bottom-left-radius: 2px; }
        
        .chat-input { padding: 12px; background: white; display: flex; gap: 8px; border-top: 1px solid #eee; }
        #text-input { flex: 1; border: none; background: #f1f3f4; padding: 12px 18px; border-radius: 25px; outline: none; }

        /* MATCH POPUP */
        .match-popup { position: absolute; top:0; left:0; width:100%; height:100%; background: var(--gradient); z-index: 1000; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; text-align: center; }
    </style>
</head>
<body>

<div id="app">
    <nav id="navbar" class="hidden">
        <div class="logo-text">KELVIN LOVING 🏖️</div>
        <div class="nav-icons">
            <button onclick="showView('page-lobby')">🔥</button>
            <button onclick="showView('page-matches')">💬</button>
            <button onclick="deconnecter()" style="font-size: 14px;">Quitter</button>
        </div>
    </nav>

    <!-- AUTH -->
    <section id="page-auth" class="view">
        <div class="auth-card">
            <h2>KELVIN LOVING ❤️</h2>
            <p id="auth-hint" style="color:gray; font-size: 12px; margin-bottom:10px;">Le site de rencontre étudiant.</p>
            <input id="auth-email" type="email" placeholder="Email Université">
            
            <div id="fields-signup" class="hidden">
                <input id="auth-nom" type="text" placeholder="Ton Prénom">
                <input id="auth-univ" type="text" placeholder="Faculté / Année">
                <select id="auth-sexe">
                    <option value="fille">👩 Je suis une Fille</option>
                    <option value="garcon">👨 Je suis un Garçon</option>
                </select>
                <input type="file" id="auth-photo" onchange="preview(event)">
                <center><img id="pre-img" style="width:60px; height:60px; border-radius:50%; display:none; object-fit:cover; margin:10px; border:2px solid #ff4d6d;"></center>
            </div>
            
            <input id="auth-pass" type="password" placeholder="Mot de Passe" class="hidden">
            <button class="btn-action" onclick="handleAuth()">ENTRER ➔</button>
        </div>
    </section>

    <!-- FEED (FLAMMES) -->
    <section id="page-lobby" class="view hidden">
        <div style="padding: 15px; font-weight: bold; color: #ff4d6d;">Trouve ton Crush 🔥</div>
        <div id="discover-feed"></div>
    </section>

    <!-- MATCHES LIST -->
    <section id="page-matches" class="view hidden">
        <div style="padding: 15px; font-weight: bold; color: #ff4d6d; border-bottom: 1px solid #eee;">Tes Matchs (Discussions)</div>
        <div id="matches-list">
            <p style="text-align:center; margin-top:20px; color:gray;">Aucun match pour le moment. Envoie des flammes ! 🔥</p>
        </div>
    </section>

    <!-- CHAT -->
    <section id="page-chat" class="view hidden">
        <div class="chat-container">
            <div style="padding:10px; display:flex; align-items:center; gap:10px; background:white; border-bottom:1px solid #eee;">
                <button onclick="showView('page-matches')" style="border:none; background:none; font-size:20px;">←</button>
                <img id="chat-head-img" style="width:35px; height:35px; border-radius:50%; object-fit:cover;">
                <b id="chat-name">Nom</b>
            </div>
            <div id="messages-box"></div>
            <div class="chat-input">
                <input id="text-input" type="text" placeholder="Tape un message...">
                <button onclick="sendMsg()" style="background:var(--accent); color:white; border:none; width:45px; height:45px; border-radius:50%;">➤</button>
            </div>
        </div>
    </section>

    <!-- MATCH POPUP -->
    <div id="match-screen" class="match-popup hidden">
        <h1>C'EST UN MATCH ! 🔥</h1>
        <p>Il/Elle t'a aussi envoyé une flamme !</p>
        <button class="btn-action" style="background:white; color:#ff4d6d; width:200px; margin-top:30px;" onclick="closeMatch()">Discuter</button>
    </div>
</div>

<script>
    const S_URL = "https://doovevgkmarozjululkr.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvb3ZldmdrbWFyb3pqdWx1bGtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyOTE3MzMsImV4cCI6MjA5Njg2NzczM30.Iao5_dnv4j71IPSpy-rdWGR0NPzDEUBMERPFVE8o1G0";
    const sb = supabase.createClient(S_URL, S_KEY);

    let me = null, target = null, step = 1;

    function preview(e) { 
        const r = new FileReader(); 
        r.onload = () => { document.getElementById('pre-img').src = r.result; document.getElementById('pre-img').style.display='block'; }; 
        if(e.target.files[0]) r.readAsDataURL(e.target.files[0]); 
    }

    // --- AUTH ---
    async function handleAuth() {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        try {
            if(step === 1) {
                const { data } = await sb.from('profiles').select('*').eq('email', email);
                if(data && data.length > 0) {
                    document.getElementById('auth-hint').innerText = "Bon retour !";
                    document.getElementById('auth-pass').classList.remove('hidden');
                    step = 2;
                } else {
                    document.getElementById('auth-hint').innerText = "Crée ton profil.";
                    document.getElementById('fields-signup').classList.remove('hidden');
                    document.getElementById('auth-pass').classList.remove('hidden');
                    step = 3;
                }
            } else if(step === 2) {
                const { data, error } = await sb.from('profiles').select('*').eq('email', email).eq('password', pass).single();
                if(error) throw new Error("Erreur de connexion");
                startApp(data);
            } else if(step === 3) {
                const nom = document.getElementById('auth-nom').value;
                const univ = document.getElementById('auth-univ').value;
                const photo = document.getElementById('pre-img').src;
                const sexe = document.getElementById('auth-sexe').value;
                const { data, error } = await sb.from('profiles').insert([{ email, password: pass, nom, photo, universite: univ, sexe }]).select();
                if(error) throw error;
                startApp(data[0]);
            }
        } catch (e) { alert(e.message); }
    }

    function startApp(data) {
        me = data;
        localStorage.setItem('kelvin_user_id', me.id);
        showView('page-lobby');
        initRealtime();
    }

    // --- FEED ---
    async function renderFeed() {
        const { data: users } = await sb.from('profiles').select('*').neq('id', me.id);
        const feed = document.getElementById('discover-feed');
        feed.innerHTML = users.map(u => `
            <div class="profile-card">
                <img src="${u.photo}" class="profile-img">
                <div class="profile-info"><b>${u.nom}</b><br><small>${u.universite}</small></div>
                <button class="flame-btn" onclick="sendFlame('${u.id}', '${u.nom}', '${u.photo}')">🔥</button>
            </div>
        `).join('');
    }

    async function sendFlame(toId, nom, photo) {
        await sb.from('likes').insert([{ from_id: me.id, to_id: toId }]);
        const { data: match } = await sb.from('likes').select('*').eq('from_id', toId).eq('to_id', me.id);
        if(match && match.length > 0) {
            target = { id: toId, nom: nom, photo: photo };
            document.getElementById('match-screen').classList.remove('hidden');
        } else {
            alert("Flamme envoyée ! 🔥");
        }
    }

    // --- MATCHES LIST ---
    async function renderMatches() {
        // Un match = A aime B ET B aime A
        const { data: myLikes } = await sb.from('likes').select('to_id').eq('from_id', me.id);
        const myLikedIds = myLikes.map(l => l.to_id);

        const { data: likedMe } = await sb.from('likes').select('from_id').eq('to_id', me.id).in('from_id', myLikedIds);
        const matchIds = likedMe.map(l => l.from_id);

        const { data: matchProfiles } = await sb.from('profiles').select('*').in('id', matchIds);
        
        const list = document.getElementById('matches-list');
        if(!matchProfiles || matchProfiles.length === 0) {
            list.innerHTML = `<p style="text-align:center; margin-top:20px; color:gray;">Aucun match pour le moment.</p>`;
            return;
        }

        list.innerHTML = matchProfiles.map(u => `
            <div class="match-item" onclick="openChat({id:'${u.id}', nom:'${u.nom}', photo:'${u.photo}'})">
                <img src="${u.photo}" class="match-avatar">
                <div>
                    <b>${u.nom}</b><br>
                    <small style="color:var(--secondary);">C'est un match ! Discutez.</small>
                </div>
            </div>
        `).join('');
    }

    // --- CHAT ---
    async function openChat(userObj) {
        target = userObj;
        document.getElementById('chat-name').innerText = target.nom;
        document.getElementById('chat-head-img').src = target.photo;
        showView('page-chat');
        loadMessages();
    }

    async function sendMsg() {
        const val = document.getElementById('text-input').value.trim();
        if(!val || !target) return;
        await sb.from('messages').insert([{ expediteur_id: me.id, destinataire_id: target.id, texte: val }]);
        document.getElementById('text-input').value = "";
        loadMessages();
    }

    async function loadMessages() {
        if(!target) return;
        const { data } = await sb.from('messages').select('*').or(`and(expediteur_id.eq.${me.id},destinataire_id.eq.${target.id}),and(expediteur_id.eq.${target.id},destinataire_id.eq.${me.id})`).order('created_at', { ascending: true });
        const box = document.getElementById('messages-box');
        box.innerHTML = data.map(m => `<div class="msg ${m.expediteur_id === me.id ? 'moi' : 'autre'}">${m.texte}</div>`).join('');
        box.scrollTop = box.scrollHeight;
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('navbar').classList.toggle('hidden', id === 'page-auth');
        if(id === 'page-lobby') renderFeed();
        if(id === 'page-matches') renderMatches();
    }

    function closeMatch() {
        document.getElementById('match-screen').classList.add('hidden');
        openChat(target);
    }

    function initRealtime() {
        sb.channel('db').on('postgres_changes', { event: '*', schema: 'public' }, () => {
            if(!document.getElementById('page-chat').classList.contains('hidden')) loadMessages();
            if(!document.getElementById('page-matches').classList.contains('hidden')) renderMatches();
        }).subscribe();
    }

    function deconnecter() { localStorage.clear(); location.reload(); }

    window.onload = async () => {
        const id = localStorage.getItem('kelvin_user_id');
        if(id) {
            const { data } = await sb.from('profiles').select('*').eq('id', id).single();
            if(data) startApp(data);
        }
    };
</script>
</body>
</html>
