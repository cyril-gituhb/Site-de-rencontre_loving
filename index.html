<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KELVIN LOVING 🏖️</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --accent: #ff4d6d; /* Rose Passion */
            --gradient: linear-gradient(135deg, #ff4e50, #f9d423); /* Sunset */
            --dark: #1a1a1a;
            --white: #ffffff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: #000; }
        
        /* DESIGN UNIQUE KELVIN */
        #app { 
            width: 100vw; height: 100%; display: flex; flex-direction: column; 
            background: var(--white); position: relative; 
        }
        @media (min-width: 600px) { #app { width: 400px; height: 92vh; border-radius: 30px; margin: auto; border: 8px solid #333; } }

        /* NAVBAR SÉDUISANTE */
        nav { background: var(--white); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .logo-text { font-size: 20px; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-icons button { background: none; border: none; font-size: 22px; cursor: pointer; margin-left: 15px; }

        .view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .hidden { display: none !important; }

        /* AUTHENTIFICATION STYLEE */
        #page-auth { background: var(--gradient); justify-content: center; align-items: center; padding: 30px; }
        .auth-card { background: white; padding: 30px; border-radius: 25px; width: 100%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 15px; font-size: 16px; outline: none; }
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 15px; background: var(--dark); color: white; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* DÉCOUVERTE (STYLE TINDER/INSTA) */
        #discover-feed { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #fdfdfd; }
        .profile-card { height: 250px; border-radius: 20px; position: relative; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; }
        .profile-img { width: 100%; height: 100%; object-fit: cover; }
        .profile-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white; }
        .flame-btn { position: absolute; top: 10px; right: 10px; background: white; border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* CHAT PRIVE */
        .chat-container { flex: 1; display: flex; flex-direction: column; background: #f7f7f7; }
        #messages-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 20px; font-size: 14px; position: relative; line-height: 1.4; }
        .msg.moi { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 5px; }
        .msg.autre { align-self: flex-start; background: #eee; color: #333; border-bottom-left-radius: 5px; }
        
        .chat-input { padding: 15px; background: white; display: flex; gap: 10px; border-top: 1px solid #eee; }
        #text-input { flex: 1; border: none; background: #f0f0f0; padding: 12px 20px; border-radius: 30px; }

        /* MATCH POPUP */
        .match-popup { position: absolute; top:0; left:0; width:100%; height:100%; background: var(--gradient); z-index: 1000; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; animation: zoomIn 0.5s; }
    </style>
</head>
<body>

<div id="app">
    <!-- Navbar -->
    <nav id="navbar" class="hidden">
        <div class="logo-text">KELVIN LOVING 🏖️</div>
        <div class="nav-icons">
            <button onclick="showView('page-lobby')">🔥</button>
            <button onclick="showView('page-chat-list')">💬</button>
            <button onclick="showView('page-settings')">👤</button>
        </div>
    </nav>

    <!-- AUTHENTIFICATION INTÉLLIGENTE -->
    <section id="page-auth" class="view">
        <div class="auth-card">
            <h2>Trouve ton Crush ❤️</h2>
            <p id="auth-hint" style="color:gray; margin-bottom:15px;">Email de ton Université</p>
            <input id="auth-email" type="email" placeholder="email@etudiant.com">
            
            <div id="fields-signup" class="hidden">
                <input id="auth-nom" type="text" placeholder="Ton Prénom">
                <input id="auth-univ" type="text" placeholder="Ta Faculté / Uni">
                <select id="auth-sexe">
                    <option value="fille">👩 Je suis une Fille</option>
                    <option value="garcon">👨 Je suis un Garçon</option>
                </select>
                <input type="file" id="auth-photo" onchange="preview(event)">
                <center><img id="pre-img" style="width:60px; height:60px; border-radius:50%; display:none; object-fit:cover; margin:10px;"></center>
            </div>
            
            <input id="auth-pass" type="password" placeholder="Mot de Passe" class="hidden">
            <button class="btn-action" onclick="handleAuth()">CONTINUER ➔</button>
        </div>
    </section>

    <!-- FEED DE DÉCOUVERTE -->
    <section id="page-lobby" class="view hidden">
        <div style="padding: 15px; font-weight: bold; color: var(--accent);">Étudiants proches de toi ✨</div>
        <div id="discover-feed"></div>
    </section>

    <!-- CHAT PRIVÉ -->
    <section id="page-chat" class="view hidden">
        <div class="chat-container">
            <div style="padding:15px; display:flex; align-items:center; gap:10px; background:white; border-bottom:1px solid #eee;">
                <button onclick="showView('page-lobby')" style="border:none; background:none; font-size:20px;">←</button>
                <img id="chat-head-img" style="width:35px; height:35px; border-radius:50%; object-fit:cover;">
                <b id="chat-head-name">Nom</b>
            </div>
            <div id="messages-box"></div>
            <div class="chat-input">
                <input id="text-input" type="text" placeholder="Dis quelque chose de gentil...">
                <button onclick="sendMsg()" style="background:var(--accent); color:white; border:none; width:45px; height:45px; border-radius:50%;">🔥</button>
            </div>
        </div>
    </section>

    <!-- POPUP MATCH -->
    <div id="match-screen" class="match-popup hidden">
        <h1 style="font-size: 40px;">ITS A MATCH! 🔥</h1>
        <p>Vous vous plaisez mutuellement !</p>
        <button class="btn-action" style="background:white; color:var(--accent); width:200px; margin-top:20px;" onclick="closeMatch()">Lancer le Chat</button>
    </div>
</div>

<script>
    const S_URL = "https://doovevgkmarozjululkr.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvb3ZldmdrbWFyb3pqdWx1bGtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyOTE3MzMsImV4cCI6MjA5Njg2NzczM30.Iao5_dnv4j71IPSpy-rdWGR0NPzDEUBMERPFVE8o1G0";
    const sb = supabase.createClient(S_URL, S_KEY);

    let me = null, target = null, step = 1;

    function preview(e) { const r = new FileReader(); r.onload = () => { document.getElementById('pre-img').src = r.result; document.getElementById('pre-img').style.display='block'; }; r.readAsDataURL(e.target.files[0]); }

    // --- AUTH LOGIQUE ---
    async function handleAuth() {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;

        if(step === 1) {
            const { data } = await sb.from('profiles').select('*').eq('email', email);
            if(data && data.length > 0) {
                document.getElementById('auth-hint').innerText = "Bon retour ! Connecte-toi.";
                document.getElementById('auth-pass').classList.remove('hidden');
                step = 2; // Login
            } else {
                document.getElementById('auth-hint').innerText = "Crée ton profil étudiant.";
                document.getElementById('fields-signup').classList.remove('hidden');
                document.getElementById('auth-pass').classList.remove('hidden');
                step = 3; // Signup
            }
        } else if(step === 2) {
            const { data } = await sb.from('profiles').select('*').eq('email', email).eq('password', pass).single();
            if(data) startApp(data); else alert("Mauvais mot de passe");
        } else if(step === 3) {
            const nom = document.getElementById('auth-nom').value;
            const univ = document.getElementById('auth-univ').value;
            const photo = document.getElementById('pre-img').src;
            const sexe = document.getElementById('auth-sexe').value;
            const { data } = await sb.from('profiles').insert([{ email, password: pass, nom, photo, universite: univ, sexe }]).select();
            if(data) startApp(data[0]);
        }
    }

    function startApp(userData) {
        me = userData;
        localStorage.setItem('kelvin_user_id', me.id);
        showView('page-lobby');
        initRealtime();
    }

    // --- DISCOVERY (FLAMMES & MATCHES) ---
    async function renderFeed() {
        const { data: users } = await sb.from('profiles').select('*').neq('id', me.id);
        const feed = document.getElementById('discover-feed');
        feed.innerHTML = users.map(u => `
            <div class="profile-card">
                <img src="${u.photo}" class="profile-img">
                <div class="profile-info">
                    <b>${u.nom}</b><br>
                    <small>${u.universite}</small>
                </div>
                <button class="flame-btn" onclick="sendFlame('${u.id}')">🔥</button>
            </div>
        `).join('');
    }

    async function sendFlame(toId) {
        // Enregistrer le Like
        await sb.from('likes').insert([{ from_id: me.id, to_id: toId }]);
        
        // Vérifier si c'est un Match
        const { data: match } = await sb.from('likes').select('*').eq('from_id', toId).eq('to_id', me.id);
        
        if(match && match.length > 0) {
            document.getElementById('match-screen').classList.remove('hidden');
            target = { id: toId }; // On prépare le chat
        } else {
            alert("Flamme envoyée ! 🔥 Si c'est réciproque, vous matcherez !");
        }
    }

    // --- CHAT ---
    async function openChat(userObj) {
        target = userObj;
        document.getElementById('chat-head-name').innerText = target.nom;
        document.getElementById('chat-head-img').src = target.photo;
        showView('page-chat');
        loadMessages();
    }

    async function sendMsg() {
        const val = document.getElementById('text-input').value;
        if(!val) return;
        await sb.from('messages').insert([{ expediteur_id: me.id, destinataire_id: target.id, texte: val }]);
        document.getElementById('text-input').value = "";
    }

    async function loadMessages() {
        if(!target) return;
        const { data } = await sb.from('messages').select('*').or(`and(expediteur_id.eq.${me.id},destinataire_id.eq.${target.id}),and(expediteur_id.eq.${target.id},destinataire_id.eq.${me.id})`).order('created_at', { ascending: true });
        document.getElementById('messages-box').innerHTML = data.map(m => `
            <div class="msg ${m.expediteur_id === me.id ? 'moi' : 'autre'}">${m.texte}</div>
        `).join('');
        document.getElementById('messages-box').scrollTop = document.getElementById('messages-box').scrollHeight;
    }

    // --- NAVIGATION ---
    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('navbar').classList.toggle('hidden', id === 'page-auth');
        if(id === 'page-lobby') renderFeed();
    }

    function closeMatch() {
        document.getElementById('match-screen').classList.add('hidden');
        showView('page-chat');
    }

    function initRealtime() {
        sb.channel('dating').on('postgres_changes', { event: '*', schema: 'public' }, () => {
            if(!document.getElementById('page-chat').classList.contains('hidden')) loadMessages();
            renderFeed();
        }).subscribe();
    }

    function deconnecter() { localStorage.clear(); location.reload(); }

    window.onload = async () => {
        const id = localStorage.getItem('kelvin_user_id');
        if(id) {
            const { data } = await sb.from('profiles').select('*').eq('id', id).single();
            if(data) startApp(data);
        }
    };
</script>
</body>
</html>
