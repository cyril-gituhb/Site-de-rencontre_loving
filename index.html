<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>kELVIN Loving 🏖️</title>
<!-- CHARGEMENT DE SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* --- TON STYLE WHATSAPP --- */
* {margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,sans-serif}
body {background:#e5ddd5;height:100vh;overflow:hidden; width: 100vw;}
.page {display:none;height:100vh;flex-direction:column; width: 100%;}
.page.active {display:flex}

.whatsapp-header {
  background:#128C7E;color:white;padding:16px 20px;font-size:20px;font-weight:600;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0
}
.whatsapp-header button {
  background:rgba(255,255,255,0.2);border:none;color:white;font-size:13px;
  cursor:pointer;padding:6px 12px;border-radius:20px
}

#page-signup { background:linear-gradient(135deg,#128C7E 0%,#25D366 100%); justify-content:center;align-items:center }
.card { background:white;padding:30px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.3);max-width:380px;width:90%;display:flex;flex-direction:column;gap:15px }
.card h2 {color:#128C7E;text-align:center;}
#nom {padding:14px;border:1px solid #ddd;border-radius:8px;width:100%}

.sexe-box {display:flex;gap:10px}
.sexe-btn { flex:1;padding:14px;border:2px solid #e0e0e0;background:white;border-radius:8px;cursor:pointer;font-size:28px; }
.sexe-btn.active {background:#DCF8C6;border-color:#128C7E;}

.upload { background:#f8f9fa;text-align:center;border:2px dashed #128C7E;color:#128C7E;padding:14px;border-radius:8px;cursor:pointer; }
#photo {display:none}
#preview { width:80px;height:80px;border-radius:50%;margin:0 auto;display:none;object-fit:cover;border:3px solid #128C7E }

.card button { background:#25D366;color:white;border:none;padding:15px;border-radius:8px;font-weight:bold;cursor:pointer }

/* LOBBY */
.lobby-stats { background:#075E54;color:white;padding:10px;text-align:center;font-size:13px }
#groupes {flex:1;overflow-y:auto;background:white}
.groupe { padding:20px;border-bottom:1px solid #eee; }
.membres-liste { display:flex;flex-wrap:wrap;gap:10px;margin-top:10px }
.membre { display:flex;flex-direction:column;align-items:center; width: 50px;}
.avatar { width:45px;height:45px;border-radius:50%;object-fit:cover;border:2px solid #ddd }
.avatar.occupe { border-color: #ff4b2b; }
.avatar.dispo { border-color: #25D366; }

/* CHAT */
.chat-container { flex:1;display:flex;flex-direction:column;background:#e5ddd5 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
.chat-header { background:#128C7E;color:white;padding:10px;display:flex;align-items:center;gap:10px; }
#chat-photo { width:40px;height:40px;border-radius:50%; }
.messages { flex:1;padding:15px;overflow-y:auto;display:flex;flex-direction:column;gap:8px }
.bulle { max-width:75%;padding:8px 12px;border-radius:8px;font-size:15px;box-shadow:0 1px 1px rgba(0,0,0,0.1); line-height: 1.4; }
.msg.moi { align-self: flex-end; background: #DCF8C6; }
.msg.autre { align-self: flex-start; background: white; }
.input-box { display:flex;padding:10px;background:#f0f0f0;gap:8px; }
#msg { flex:1;padding:12px;border-radius:25px;border:none;outline:none }
.btn-send { width:45px;height:45px;border-radius:50%;background:#128C7E;color:white;border:none;cursor:pointer }
</style>
</head>
<body>

<!-- PAGE INSCRIPTION -->
<section id="page-signup" class="page active">
  <div class="card">
    <h2>kELVIN Loving ❤️</h2>
    <input id="nom" type="text" placeholder="Ton prénom étudiant">
    <div class="sexe-box">
      <button type="button" class="sexe-btn" data-sexe="fille">👩 Fille</button>
      <button type="button" class="sexe-btn" data-sexe="garcon">👨 Garçon</button>
    </div>
    <input type="hidden" id="sexe" value="">
    <label class="upload">📷 Photo de profil
      <input type="file" id="photo" accept="image/*">
    </label>
    <center><img id="preview"></center>
    <button type="button" onclick="sInscrire()">Commencer l'aventure</button>
  </div>
</section>

<!-- PAGE LOBBY (LISTE GROUPES) -->
<section id="page-lobby" class="page">
  <div class="whatsapp-header">
    <span>kELVIN Groupes</span>
    <button onclick="deconnecter()">Quitter</button>
  </div>
  <div class="lobby-stats" id="stats">Connexion...</div>
  <div id="groupes"></div>
</section>

<!-- PAGE CHAT -->
<section id="page-chat" class="page">
  <div class="chat-container">
    <div class="chat-header">
      <button style="background:none;border:none;color:white;font-size:24px;" onclick="retourLobby()">←</button>
      <img id="chat-photo" src="">
      <div>
        <b id="chat-nom"></b><br>
        <small>en ligne</small>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-box">
      <input id="msg" type="text" placeholder="Écrire...">
      <button class="btn-send" onclick="envoyer()">➤</button>
    </div>
  </div>
</section>

<script>
// CONFIGURATION SUPABASE
const SUPABASE_URL = "https://doovevgkmarozjululkr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvb3ZldmdrbWFyb3pqdWx1bGtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyOTE3MzMsImV4cCI6MjA5Njg2NzczM30.Iao5_dnv4j71IPSpy-rdWGR0NPzDEUBMERPFVE8o1G0";
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;
let chatActif = null;

// Gestion Sexe
document.querySelectorAll('.sexe-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.sexe-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('sexe').value = btn.dataset.sexe;
  }
});

// Photo Preview
document.getElementById('photo').onchange = e => {
  const reader = new FileReader();
  reader.onload = () => {
    document.getElementById('preview').src = reader.result;
    document.getElementById('preview').style.display = 'block';
  }
  reader.readAsDataURL(e.target.files[0]);
}

// 1. INSCRIPTION
async function sInscrire() {
  const nom = document.getElementById('nom').value.trim();
  const sexe = document.getElementById('sexe').value;
  const photoImg = document.getElementById('preview').src;

  if(!nom || !sexe || !photoImg) return alert("Remplis tout ! ❤️");

  // Créer un ID unique pour cette session (vu qu'on n'utilise pas l'auth email complète)
  const userId = "user_" + Date.now();
  
  const newUser = { id_temp: userId, nom, sexe, photo: photoImg, is_online: true };

  // On cherche un groupe libre
  const { data: groups } = await _supabase.from('groups').select('*');
  let targetGroupId = null;

  for (let g of groups) {
    const { count } = await _supabase.from('profiles').select('*', { count: 'exact', head: true }).eq('groupe_id', g.id).eq('sexe', sexe);
    if (count < 5) {
      targetGroupId = g.id;
      break;
    }
  }

  // Si aucun groupe n'a de place, on en crée un
  if (!targetGroupId) {
    const { data: newG } = await _supabase.from('groups').insert({nom: 'Amphi kELVIN'}).select();
    targetGroupId = newG[0].id;
  }

  // Sauvegarder dans Profiles (simulation de session)
  // Note: On utilise un ID aléatoire car on n'utilise pas Supabase Auth ici pour simplifier
  const { data, error } = await _supabase.from('profiles').insert([{
    nom, sexe, photo: photoImg, groupe_id: targetGroupId, is_online: true
  }]).select();

  if(error) return alert("Erreur base de données");

  user = data[0];
  localStorage.setItem('k_user_id', user.id);
  
  showPage('page-lobby');
  startLobbyRealtime();
}

// 2. LOBBY & GROUPES
async function renderLobby() {
  const { data: groups } = await _supabase.from('groups').select('*');
  const { data: allUsers } = await _supabase.from('profiles').select('*');

  document.getElementById('stats').innerText = `🔵 ${allUsers.length} Étudiants en ligne`;

  const container = document.getElementById('groupes');
  container.innerHTML = groups.map(g => {
    const members = allUsers.filter(u => u.groupe_id === g.id);
    const filles = members.filter(u => u.sexe === 'fille');
    const garcons = members.filter(u => u.sexe === 'garcon');

    return `
      <div class="groupe">
        <div style="display:flex; justify-content:space-between">
            <b>${g.nom} #${g.id.slice(0,4)}</b>
            <span>${filles.length}♀️ / ${garcons.length}♂️</span>
        </div>
        <div class="membres-liste">
          ${members.map(m => `
            <div class="membre" onclick="clicMembre('${m.id}')">
              <img class="avatar ${m.chat_avec ? 'occupe' : 'dispo'}" src="${m.photo}">
              <small>${m.nom === user.nom ? 'Moi' : m.nom}</small>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

async function clicMembre(id) {
  if (id === user.id) return;
  
  const { data: cible } = await _supabase.from('profiles').select('*').eq('id', id).single();

  // RÈGLE : Pas de Garçon-Garçon ou Fille-Fille
  if (cible.sexe === user.sexe) {
    return alert("🏖️ kELVIN Loving : Tu ne peux parler qu'aux personnes du sexe opposé !");
  }

  // RÈGLE : Déjà occupé
  if (cible.chat_avec && cible.chat_avec !== user.id) {
    return alert("Cette personne est déjà en discussion ❤️");
  }

  // RÈGLE : Moi je suis occupé
  if (user.chat_avec && user.chat_avec !== cible.id) {
    return alert("Tu as déjà une discussion en cours !");
  }

  // Activer le chat
  await _supabase.from('profiles').update({ chat_avec: cible.id }).eq('id', user.id);
  await _supabase.from('profiles').update({ chat_avec: user.id }).eq('id', cible.id);
  
  user.chat_avec = cible.id;
  chatActif = cible;
  
  openChat();
}

// 3. CHAT
function openChat() {
  document.getElementById('chat-nom').innerText = chatActif.nom;
  document.getElementById('chat-photo').src = chatActif.photo;
  showPage('page-chat');
  loadMessages();
  subscribeToMessages();
}

async function loadMessages() {
  const { data } = await _supabase.from('messages')
    .select('*')
    .or(`and(expediteur_id.eq.${user.id},destinataire_id.eq.${chatActif.id}),and(expediteur_id.eq.${chatActif.id},destinataire_id.eq.${user.id})`)
    .order('created_at', { ascending: true });

  const container = document.getElementById('messages');
  container.innerHTML = data.map(m => `
    <div class="msg ${m.expediteur_id === user.id ? 'moi' : 'autre'}">
      <div class="bulle">${m.texte}</div>
    </div>
  `).join('');
  container.scrollTop = container.scrollHeight;
}

async function envoyer() {
  const input = document.getElementById('msg');
  const texte = input.value.trim();
  if (!texte) return;

  await _supabase.from('messages').insert({
    expediteur_id: user.id,
    destinataire_id: chatActif.id,
    texte: texte
  });

  input.value = "";
  loadMessages();
}

// 4. REALTIME
function startLobbyRealtime() {
  renderLobby();
  _supabase.channel('public:profiles').on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, renderLobby).subscribe();
}

function subscribeToMessages() {
  _supabase.channel('public:messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, loadMessages).subscribe();
}

// UTILS
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function retourLobby() {
    showPage('page-lobby');
}

async function deconnecter() {
    if(confirm("Quitter kELVIN Loving ?")) {
        await _supabase.from('profiles').delete().eq('id', user.id);
        localStorage.clear();
        location.reload();
    }
}

window.onload = async () => {
    const savedId = localStorage.getItem('k_user_id');
    if(savedId) {
        const { data } = await _supabase.from('profiles').select('*').eq('id', savedId).single();
        if(data) {
            user = data;
            showPage('page-lobby');
            startLobbyRealtime();
        }
    }
}
</script>
</body>
</html>
